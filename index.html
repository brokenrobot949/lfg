<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LFG — Guildmaster</title>
<style>
  :root {
    --bg: #16130e;
    --panel: #221d15;
    --panel2: #2b251b;
    --border: #3d3524;
    --text: #e8dcc2;
    --muted: #9d9078;
    --gold: #d4a72c;
    --gold-dim: #8a6d1d;
    --green: #7fb069;
    --yellow: #e0b84c;
    --red: #d1604f;
    --blue: #6f9ec9;
    --q-common: #b7ad99;
    --q-magic: #6f9ec9;
    --q-rare: #b884d8;
    --q-legendary: #e0912c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.45;
    min-height: 100vh;
  }
  #app { max-width: 1100px; margin: 0 auto; padding: 0 14px 80px; }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 0 8px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 20;
  }
  .brand { font-size: 26px; font-weight: bold; color: var(--gold); letter-spacing: 2px; }
  .brand small { font-size: 12px; color: var(--muted); letter-spacing: 0; font-weight: normal; display: block; margin-top: -4px;}
  .goldbox { font-size: 18px; color: var(--gold); white-space: nowrap; }
  .timers {
    display: flex; gap: 6px; overflow-x: auto; flex: 1; min-width: 120px;
    scrollbar-width: thin; padding: 2px 0;
  }
  .chip {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 12px;
    font-size: 12px; padding: 2px 9px; white-space: nowrap; color: var(--muted);
  }
  .chip b { color: var(--text); font-weight: normal; }
  .chip .cd { color: var(--gold); font-variant-numeric: tabular-nums; }
  nav { display: flex; gap: 4px; padding: 8px 0; border-bottom: 1px solid var(--border); position: sticky; top: 55px; background: var(--bg); z-index: 19; flex-wrap: wrap;}
  nav button {
    background: none; border: 1px solid transparent; color: var(--muted);
    font-family: inherit; font-size: 15px; padding: 6px 16px; cursor: pointer; border-radius: 6px;
  }
  nav button:hover { color: var(--text); }
  nav button.active { color: var(--gold); border-color: var(--border); background: var(--panel); }
  .subtab {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: inherit; font-size: 13px; padding: 5px 14px; cursor: pointer; border-radius: 6px;
  }
  .subtab:hover { color: var(--text); }
  .subtab.active { color: var(--gold); border-color: var(--gold-dim); background: var(--panel2); }

  /* ---------- general ---------- */
  h2 { color: var(--gold); font-size: 20px; margin: 20px 0 10px; letter-spacing: 1px; }
  h3 { font-size: 16px; margin: 14px 0 8px; color: var(--text); }
  .sub { color: var(--muted); font-size: 13px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 10px; }
  .grid .card { margin-bottom: 0; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .spread { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  button.act {
    background: var(--gold-dim); color: #fff8e7; border: none; border-radius: 5px;
    font-family: inherit; font-size: 13px; padding: 5px 12px; cursor: pointer;
  }
  button.act:hover:not(:disabled) { background: var(--gold); color: #1a1508; }
  button.act:disabled { background: #3a3428; color: #7a6f5a; cursor: not-allowed; }
  button.ghost {
    background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px;
    font-family: inherit; font-size: 12px; padding: 4px 10px; cursor: pointer;
  }
  button.ghost:hover { color: var(--text); border-color: var(--muted); }
  .gold-t { color: var(--gold); }
  .green { color: var(--green); }
  .yellow { color: var(--yellow); }
  .red { color: var(--red); }
  .blue { color: var(--blue); }
  .cd { font-variant-numeric: tabular-nums; }
  .bar { background: #17130c; border: 1px solid var(--border); border-radius: 4px; height: 8px; overflow: hidden; margin: 4px 0; }
  .bar > div { background: var(--blue); height: 100%; }
  .marks { letter-spacing: 3px; }
  .flavor { font-style: italic; color: var(--muted); font-size: 13px; margin: 4px 0 6px; }
  .tag {
    font-size: 11px; border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  }
  .tag.tank { color: var(--blue); } .tag.healer { color: var(--green); } .tag.dps { color: var(--red); }
  .q-common { color: var(--q-common); } .q-magic { color: var(--q-magic); }
  .q-rare { color: var(--q-rare); } .q-legendary { color: var(--q-legendary); }
  .tag.q-common { color: var(--q-common); border-color: var(--q-common); }
  .tag.q-magic { color: var(--q-magic); border-color: var(--q-magic); }
  .tag.q-rare { color: var(--q-rare); border-color: var(--q-rare); }
  .tag.q-legendary { color: var(--q-legendary); border-color: var(--q-legendary); }
  .card.legendary-glow { box-shadow: 0 0 0 1px var(--q-legendary) inset; }
  .ability { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .ability b { color: var(--text); font-weight: normal; }
  hr.thin { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }

  /* ---------- modal ---------- */
  #modal-wrap {
    position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50;
    display: flex; align-items: flex-start; justify-content: center; padding: 40px 14px;
    overflow-y: auto;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--gold-dim); border-radius: 10px;
    max-width: 640px; width: 100%; padding: 18px 20px; margin-bottom: 40px;
  }
  .modal h2 { margin-top: 0; }
  .pick-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 6px; cursor: pointer; background: var(--panel2);
  }
  .pick-row:hover { border-color: var(--muted); }
  .pick-row.sel { border-color: var(--gold); background: #33290f; }
  .pick-row .nm { flex: 1; }
  .preview { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin: 12px 0; font-size: 14px; }
  .preview .row { row-gap: 2px; }

  /* ---------- chronicle drawer ---------- */
  #drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 340px; max-width: 90vw;
    background: var(--panel); border-left: 1px solid var(--gold-dim); z-index: 60;
    padding: 16px; overflow-y: auto; box-shadow: -6px 0 24px rgba(0,0,0,.5);
  }
  .logline { font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .logline .lt { color: var(--muted); font-size: 11px; display: block; }
  footer.note { color: var(--muted); font-size: 11px; text-align: center; margin-top: 40px; }

  /* ---------- mobile ---------- */
  @media (max-width: 640px) {
    #app { padding: 0 10px 60px; }
    header { position: static; }
    nav { top: 0; }
    nav button { flex: 1 1 auto; text-align: center; padding: 10px 6px; font-size: 14px; }
    button.act, button.ghost { padding: 10px 14px; font-size: 14px; }
    .pick-row { padding: 12px 10px; }
    .grid { grid-template-columns: 1fr; }
    #modal-wrap { padding: 12px 8px; }
    .modal { padding: 14px; }
    .m-side { width: 100%; min-width: 0 !important; text-align: left !important; margin-top: 8px; }
  }
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <nav id="nav"></nav>
  <main id="view"></main>
  <footer class="note">
    LFG — your guild endures while you're away. Progress is saved automatically in this browser.
    <div style="margin-top:14px"><button class="ghost" onclick="A.openData()">💾 Backup / Restore</button> <button class="ghost" onclick="A.askReset()" style="border-color:var(--red); color:var(--red)">⟲ Reset all data</button></div>
  </footer>
</div>
<div id="modal-root"></div>
<div id="drawer-root"></div>

<script>
'use strict';
/* =====================================================================
 *  CONFIG — every balance number lives here. Tune freely.
 * ===================================================================== */
const CFG = {
  SAVE_KEY: 'lfg-save-v1',

  // --- leveling & ratings ---
  LEVEL_CAP: 20,
  XP_PER_LEVEL_STEP: 80,        // XP needed to go from level L to L+1 = this * L
  RATING_PER_LEVEL: 10,         // hero rating = level * this + talent
  TALENT_MAX: 5,                // per-hero talent bonus rolled 0..this at creation

  // --- new player ---
  STARTING_GOLD: 150,
  STARTER_LEVEL: 1,

  // --- mission success ---
  SUCCESS_BASE: 0.80,           // chance when party rating == challenge rating
  SUCCESS_SLOPE: 1.5,           // added per +100% rating advantage (linear on ratio)
  SUCCESS_MIN: 0.05,
  SUCCESS_MAX: 0.95,

  // --- injuries ---
  INJURY_BASE: 0.06,            // per-hero injury chance at rating parity
  INJURY_SLOPE: 0.55,           // added per +100% challenge disadvantage
  INJURY_MIN: 0.01,
  INJURY_MAX: 0.65,
  FAIL_INJURY_MULT: 1.75,       // injuries are likelier on failed missions
  INJURY_DURATION_H: 8,         // hours a hero is unavailable after an injury
  MAX_MARKS: 3,                 // marks at which a hero dies forever

  // --- mission rewards ---
  GOLD_PER_CR: 1.2,             // base mission gold = challenge rating * this
  XP_PER_CR: 1.1,               // base per-hero XP = challenge rating * this
  FAIL_GOLD_FRAC: 0.30,         // failed missions still pay this fraction of gold
  FAIL_XP_FRAC: 0.35,           // ...and this fraction of XP
  STORY_GOLD_MULT: 1.4,         // story missions pay premium gold
  STORY_XP_MULT: 1.0,           // ...but only standard XP — growth comes from the tavern grind
  PARTY_SIZE_REWARD_BONUS: 0.10, // extra gold & XP per hero beyond the 4-hero core

  // --- training (safe, slow XP) ---
  TRAINING_XP_PER_HOUR: 25,
  TRAINING_CAP_H: 8,            // a training session ends after this many hours

  // --- rest ---
  REST_DURATION_H: 16,          // removes one injury mark on completion

  // --- infirmary ---
  INFIRMARY_BASE_COST: 150,     // gold to remove one mark instantly...
  INFIRMARY_COST_PER_LEVEL: 25, // ...plus this per hero level

  // --- the Keep ---
  KEEP_MAX_LEVEL: 5,
  KEEP_UPGRADE_COSTS: [300, 800, 2000, 5000], // cost to reach level 2, 3, 4, 5
  ROSTER_BASE: 6,
  ROSTER_PER_KEEP_LEVEL: 2,     // extra roster slots per Keep level above 1
  TRAIN_SLOTS_BASE: 1,
  TRAIN_SLOTS_PER_KEEP_LEVEL: 1,

  // --- the Keep's passive income (accrues over time; click to collect) ---
  KEEP_INCOME_PER_H: 10,        // gold per hour at Keep level 1
  KEEP_INCOME_PER_LEVEL_H: 5,   // additional gold/hour per Keep level above 1
  KEEP_INCOME_CAP_H: 4,         // accrual stops this many hours after last collection

  // --- the job board ---
  JOBS_PER_TIER: 6,             // postings shown per difficulty tier
  JOB_LIFETIME_MIN_H: 6,        // a posting stays on the board between these...
  JOB_LIFETIME_MAX_H: 18,       // ...many hours before being replaced
  // A posting tier only appears once your highest-level living hero reaches
  // this level — so the board never buries a young guild in impossible work.
  JOB_TIER_MIN_LEVEL: [1, 5, 10, 15],
  // The Novice board always keeps at least one true beginner posting (CR at or
  // below this, 4 heroes) so a fresh level-1 party can always find easy work.
  STARTER_CR_MAX: 49,

  // --- the Tavern ---
  RECRUIT_POOL_SIZE: 4,
  RECRUIT_LIFETIME_MIN_H: 12,   // the hire board reshuffles itself every...
  RECRUIT_LIFETIME_MAX_H: 18,   // ...12–18 hours on its own
  GUILD_RENAME_COST: 100,       // gold to rename the guild after founding
  RECRUIT_REFRESH_COST: 25,
  RECRUIT_COST_BASE: 40,
  RECRUIT_COST_PER_LEVEL: 30,
  RECRUIT_COST_PER_TALENT: 12,
  RECRUIT_LEVELS_PER_CAMPAIGN: 3, // recruit max level = 1 + this * campaigns completed

  // --- powers ---
  // Each class has 3 thematic powers; a hero rolls one at creation. Their
  // individual magnitudes live in the POWERS table below. This cap is shared:
  SALVAGE_CAP: 0.75,            // failed missions never pay more than this fraction of full

  // --- relics ---
  RELIC_DROP_CHANCE: 0.22,       // base chance a mission drops a relic
  RELIC_FAIL_DROP_MULT: 0.4,     // failed missions drop far less often
  RELIC_PRICE: { common: 60, magic: 180, rare: 520, legendary: 1600 },
  RELIC_SELL_FRAC: 0.35,         // sell value as a fraction of shop price
  SHOP_STOCK_SIZE: 5,            // relics on sale at the Reliquary
  SHOP_REFRESH_COST: 60,         // pay to force fresh stock
  SHOP_LIFETIME_MIN_H: 12,       // stock rotates on its own every...
  SHOP_LIFETIME_MAX_H: 24,       // ...12–24 hours
  // relic-tier odds when a campaign chapter is first cleared (index = campaign)
  CAMPAIGN_RELIC_WEIGHTS: [
    { common: 30, magic: 55, rare: 15, legendary: 0 },
    { common: 5,  magic: 50, rare: 40, legendary: 5 },
    { common: 0,  magic: 20, rare: 60, legendary: 20 },
    { common: 0,  magic: 5,  rare: 55, legendary: 40 },
  ],

  // --- renown & guild rank (cosmetic — never spent, never lost) ---
  RENOWN_PER_CR: 0.1,            // renown per point of CR on a successful mission
  RENOWN_STORY_MULT: 2,          // story missions build fame twice as fast
  RENOWN_FAIL_FRAC: 0.25,        // failures still spread your name a little
  RENOWN_FIRST_CLEAR: 25,        // bonus per campaign chapter first-clear
  RENOWN_CAMPAIGN_COMPLETE: 100, // bonus for finishing a campaign

  // --- prestige / legacy (Retire the Charter → New-Game+) ---
  LEGACY_PER_RETIREMENT: 5,      // Legacy points earned each time the charter is retired

  LOG_LIMIT: 80,
  AWAY_MODAL_MIN_S: 60,         // show "while you were away" if gone longer than this
};

const H = 3600 * 1000; // one hour in ms
const pct = x => Math.round(x * 100) + '%';

/* =====================================================================
 *  CLASSES
 * ===================================================================== */
const CLASSES = {
  Fighter:   { role: 'tank' },
  Paladin:   { role: 'tank' },
  Barbarian: { role: 'tank' },
  Cleric:    { role: 'healer' },
  Druid:     { role: 'healer' },
  Bard:      { role: 'healer' },
  Rogue:     { role: 'dps' },
  Wizard:    { role: 'dps' },
  Ranger:    { role: 'dps' },
  Warlock:   { role: 'dps' },
  Monk:      { role: 'dps' },
  Sorcerer:  { role: 'dps' },
};
const ROLE_ICON = { tank: '🛡', healer: '✚', dps: '⚔' };
const ROLE_NAME = { tank: 'Tank', healer: 'Healer', dps: 'DPS' };
const CLASS_NAMES = Object.keys(CLASSES);
const classesOfRole = r => CLASS_NAMES.filter(c => CLASSES[c].role === r);

/* =====================================================================
 *  POWERS — three per class, thematic; a hero rolls one at creation.
 *  Effect fields (all optional) are aggregated by the mission math via
 *  powerAgg()/heroPower(). The first power listed for each class is the
 *  "signature" one, used as the default when migrating older saves.
 *  Fields: successFlat, successUnderdog, partyInjuryMult, selfInjuryMult,
 *  selfImmuneOnSuccess, recoveryMult, salvageMult, goldPct, selfXpMult,
 *  partyXpPct, durationMult, ratingFlat.
 * ===================================================================== */
const POWERS = {
  // Fighter (tank) — disciplined martial prowess
  fighter_shieldwall: { cls: 'Fighter', name: 'Shield Wall',   desc: '+5% party success chance on any mission.',                  successFlat: 0.05 },
  fighter_rally:      { cls: 'Fighter', name: 'Rally',          desc: '+6 party rating from disciplined formation.',               ratingFlat: 6 },
  fighter_bulwark:    { cls: 'Fighter', name: 'Bulwark',        desc: 'Party injury chance reduced 15%.',                          partyInjuryMult: 0.85 },
  // Paladin (tank) — holy protection
  paladin_aura:       { cls: 'Paladin', name: 'Aura of Protection', desc: 'Party injury chance reduced 40%.',                      partyInjuryMult: 0.60 },
  paladin_layhands:   { cls: 'Paladin', name: 'Lay on Hands',   desc: "Party's injuries heal 20% faster (persists after missions).", recoveryMult: 0.80 },
  paladin_favor:      { cls: 'Paladin', name: 'Divine Favor',   desc: '+4% party success chance.',                                 successFlat: 0.04 },
  // Barbarian (tank) — raw savagery
  barbarian_fury:     { cls: 'Barbarian', name: 'Reckless Fury', desc: 'Earns +25% XP, but personal injury chance +60%.',          selfXpMult: 1.25, selfInjuryMult: 1.60 },
  barbarian_rage:     { cls: 'Barbarian', name: 'Blood Rage',    desc: '+12 party rating, but personal injury chance +40%.',        ratingFlat: 12, selfInjuryMult: 1.40 },
  barbarian_hide:     { cls: 'Barbarian', name: 'Thick Hide',    desc: 'Personal injury chance reduced 40%.',                       selfInjuryMult: 0.60 },
  // Cleric (healer) — divine care
  cleric_mending:     { cls: 'Cleric', name: 'Mending Prayer',   desc: "Party's injuries heal 25% faster (persists after missions).", recoveryMult: 0.75 },
  cleric_sanctuary:   { cls: 'Cleric', name: 'Sanctuary',        desc: 'Party injury chance reduced 22%.',                          partyInjuryMult: 0.78 },
  cleric_warding:     { cls: 'Cleric', name: 'Warding Light',    desc: '+4% party success chance.',                                 successFlat: 0.04 },
  // Druid (healer) — nature's gifts
  druid_bounty:       { cls: 'Druid', name: "Nature's Bounty",   desc: 'Failed missions return +75% more of their gold and XP.',    salvageMult: 1.75 },
  druid_regrowth:     { cls: 'Druid', name: 'Regrowth',          desc: "Party's injuries heal 30% faster (persists after missions).", recoveryMult: 0.70 },
  druid_wildshape:    { cls: 'Druid', name: 'Wild Shape',        desc: '+8 party rating.',                                          ratingFlat: 8 },
  // Bard (healer) — inspiring performance
  bard_silvertongue:  { cls: 'Bard', name: 'Silver Tongue',      desc: '+15% mission gold.',                                        goldPct: 0.15 },
  bard_ballad:        { cls: 'Bard', name: 'Inspiring Ballad',   desc: 'Whole party earns +12% XP.',                                partyXpPct: 0.12 },
  bard_songofrest:    { cls: 'Bard', name: 'Song of Rest',       desc: "Party's injuries heal 20% faster (persists after missions).", recoveryMult: 0.80 },
  // Rogue (dps) — cunning and larceny
  rogue_stickyfingers:{ cls: 'Rogue', name: 'Sticky Fingers',    desc: '+15% mission gold.',                                        goldPct: 0.15 },
  rogue_ambush:       { cls: 'Rogue', name: 'Ambush',            desc: '+5% party success chance.',                                 successFlat: 0.05 },
  rogue_evasion:      { cls: 'Rogue', name: 'Evasion',           desc: 'Personal injury chance reduced 50%.',                       selfInjuryMult: 0.50 },
  // Wizard (dps) — arcane mastery
  wizard_insight:     { cls: 'Wizard', name: 'Arcane Insight',   desc: '+10% success chance when the challenge exceeds party rating.', successUnderdog: 0.10 },
  wizard_fireball:    { cls: 'Wizard', name: 'Fireball',         desc: '+10 party rating.',                                         ratingFlat: 10 },
  wizard_haste:       { cls: 'Wizard', name: 'Haste',            desc: 'Mission duration reduced 10%.',                             durationMult: 0.90 },
  // Ranger (dps) — wilderness craft
  ranger_pathfinder:  { cls: 'Ranger', name: 'Pathfinder',       desc: 'Mission duration reduced 15%.',                             durationMult: 0.85 },
  ranger_mark:        { cls: 'Ranger', name: "Hunter's Mark",    desc: '+8 party rating.',                                          ratingFlat: 8 },
  ranger_camouflage:  { cls: 'Ranger', name: 'Camouflage',       desc: 'Party injury chance reduced 15%.',                          partyInjuryMult: 0.85 },
  // Warlock (dps) — eldritch pacts
  warlock_bargain:    { cls: 'Warlock', name: 'Dark Bargain',    desc: 'Whole party earns +10% XP.',                                partyXpPct: 0.10 },
  warlock_hex:        { cls: 'Warlock', name: 'Hex',             desc: '+5% party success chance.',                                 successFlat: 0.05 },
  warlock_siphon:     { cls: 'Warlock', name: 'Soul Siphon',     desc: '+12% mission gold.',                                        goldPct: 0.12 },
  // Monk (dps) — bodily discipline
  monk_ironbody:      { cls: 'Monk', name: 'Iron Body',          desc: 'Never injured on successful missions.',                     selfImmuneOnSuccess: true },
  monk_flow:          { cls: 'Monk', name: 'Flowing Form',       desc: 'Personal injury chance reduced 50%.',                       selfInjuryMult: 0.50 },
  monk_ki:            { cls: 'Monk', name: 'Focused Ki',         desc: '+8 party rating.',                                          ratingFlat: 8 },
  // Sorcerer (dps) — innate wild magic
  sorcerer_wildblood: { cls: 'Sorcerer', name: 'Wild Blood',     desc: '+8 party rating.',                                          ratingFlat: 8 },
  sorcerer_chaos:     { cls: 'Sorcerer', name: 'Chaos Surge',    desc: '+5% party success chance.',                                 successFlat: 0.05 },
  sorcerer_font:      { cls: 'Sorcerer', name: 'Font of Magic',  desc: 'Whole party earns +10% XP.',                                partyXpPct: 0.10 },
};
const POWER_KEYS = Object.keys(POWERS);
const powersOfClass = cls => POWER_KEYS.filter(k => POWERS[k].cls === cls);
const heroPower = h => POWERS[h && h.power] || null;

// Aggregate the party's power effects into a single bundle for the mission math.
function powerAgg(heroes) {
  let successFlat = 0, underdog = 0, partyInjuryMult = 1, recoveryMult = 1, salvageMult = 1,
      goldPct = 0, partyXpPct = 0, durationMult = 1, ratingFlat = 0;
  heroes.forEach(h => {
    const p = heroPower(h); if (!p) return;
    successFlat += p.successFlat || 0;
    underdog += p.successUnderdog || 0;
    goldPct += p.goldPct || 0;
    partyXpPct += p.partyXpPct || 0;
    ratingFlat += p.ratingFlat || 0;
    if (p.partyInjuryMult != null) partyInjuryMult *= p.partyInjuryMult;
    if (p.recoveryMult != null) recoveryMult *= p.recoveryMult;
    if (p.salvageMult != null) salvageMult *= p.salvageMult;
    if (p.durationMult != null) durationMult *= p.durationMult;
  });
  return { successFlat, underdog, partyInjuryMult, recoveryMult, salvageMult, goldPct, partyXpPct, durationMult, ratingFlat };
}
// a hero whose power doesn't personally inflate XP — for the "~X XP each" estimate
function representativeHero(heroes) {
  return heroes.find(h => { const p = heroPower(h); return !(p && p.selfXpMult); }) || heroes[0];
}

/* =====================================================================
 *  MISSION CONTENT
 * ===================================================================== */

const GUILD_ANIMAL = ['Griffon','Wyvern','Lion','Raven','Wolf','Stag','Basilisk','Drake','Falcon','Boar','Serpent','Bear'];
function genGuildName() {
  switch (rndInt(0, 2)) {
    case 0:  return `The ${choice(GUILD_ADJ)} ${choice(GUILD_NOUN)}`;
    case 1:  return `${choice(GUILD_NOUN)} of the ${choice(GUILD_ADJ)} ${choice(GUILD_ELEMENT)}`;
    default: return `The ${choice(GUILD_ANIMAL)} ${choice(GUILD_NOUN)}`;
  }
}

  herald:        { icon: '📯', name: 'Renown Herald',        tiers: [ { cost: 1, value: 0.25 } ], desc: v => `+${Math.round(v*100)}% renown from missions.` },
};

/* =====================================================================
 *  STATE
 * ===================================================================== */
let state = null;

function defaultState(now) {
  return {
    v: 1,
    guildName: '',        // set during the founding modal
    tabard: null,          // {pattern,c1,c2,emblem} — set via the Keep's tabard editor
    renown: 0,             // permanent guild fame — never decreases, never spent; gates rank/cosmetics
    legacy: { points: 0, ascensions: 0, perks: {} }, // prestige: carries across retirements
    gold: CFG.STARTING_GOLD,
    heroes: [],
    activeMissions: [],   // {id,name,cr,start,end,heroIds,story:{c,i}|null}
    training: [],         // {heroId,start,end}
    rests: [],            // {heroId,start,end}
    recruits: [],
    recruitsExpire: 0,    // when the hire board auto-reshuffles
    jobBoard: [],         // {id,name,cr,hours,size,flavor,tier,expires}
    relics: [],           // {id,key,tier,equippedBy:heroId|null,charges}
    shop: { relics: [], expires: 0 }, // the Reliquary — {key,price}[] + rotation time
    keepLevel: 1,
    lastCollect: now,     // when the Keep's passive income was last collected
    campaigns: [0, 0, 0, 0], // missions completed per campaign
    briefings: [],        // queued mission-result reports (persisted so offline results survive boot)
    log: [],
    nextId: 1,
    lastSeen: now,
  };
}

const rnd = (a, b) => a + Math.random() * (b - a);
const rndInt = (a, b) => Math.floor(rnd(a, b + 1));
const choice = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const uid = () => state.nextId++;

function genName(cls) {
  const pool = CLASS_NAME_POOL[cls];
  return choice(pool.first) + ' ' + choice(pool.last);
}

function newHero(cls, level, talent) {
  return {
    id: uid(), name: genName(cls), cls,
    power: choice(powersOfClass(cls)), // roll one of the class's three powers
    level, xp: 0,
    talent: talent != null ? talent : rndInt(0, CFG.TALENT_MAX),
    marks: 0,
    status: 'idle',        // idle | mission | training | resting | injured | dead
    injuredUntil: 0,
  };
}

// give any hero missing a power its class's signature (first) power — for migration
function ensureHeroPower(h) {
  if (!h.power || !POWERS[h.power] || POWERS[h.power].cls !== h.cls) h.power = powersOfClass(h.cls)[0];
}

function completedCampaignCount() {
  return state.campaigns.filter(n => n >= 5).length;
}

function genRecruit() {
  const maxLvl = Math.min(CFG.LEVEL_CAP, 1 + CFG.RECRUIT_LEVELS_PER_CAMPAIGN * completedCampaignCount());
  const level = Math.max(rndInt(1, maxLvl), heroFloorLevel());
  const h = newHero(choice(CLASS_NAMES), level);
  h.cost = CFG.RECRUIT_COST_BASE + level * CFG.RECRUIT_COST_PER_LEVEL + h.talent * CFG.RECRUIT_COST_PER_TALENT;
  return h;
}

function refreshRecruitPool() {
  state.recruits = [];
  for (let i = 0; i < CFG.RECRUIT_POOL_SIZE; i++) state.recruits.push(genRecruit());
  state.recruitsExpire = Date.now() + rnd(CFG.RECRUIT_LIFETIME_MIN_H, CFG.RECRUIT_LIFETIME_MAX_H) * H;
}

/* ---------- job board rotation ---------- */
// Pick a template for a tier, avoiding names already on the board and (optionally)
// matching a predicate. Falls back gracefully if the filter is too strict.
function genJob(tier, now, excludeNames, filter) {
  let options = JOB_POOL.filter(j => j.tier === tier && !excludeNames.includes(j.name) && (!filter || filter(j)));
  if (!options.length) options = JOB_POOL.filter(j => j.tier === tier && (!filter || filter(j)));
  if (!options.length) options = JOB_POOL.filter(j => j.tier === tier);
  const tpl = choice(options);
  return {
    id: uid(), name: tpl.name, cr: tpl.cr, hours: tpl.hours, size: tpl.size,
    flavor: tpl.flavor, tier,
    expires: now + rnd(CFG.JOB_LIFETIME_MIN_H, CFG.JOB_LIFETIME_MAX_H) * H,
  };
}

// Guarantee the Novice board always offers one genuine beginner posting
// (CR ≤ STARTER_CR_MAX). If none is present, swap out the hardest novice job for one.
function ensureNoviceStarter(now) {
  const novice = state.jobBoard.filter(j => j.tier === 0);
  if (novice.some(j => j.cr <= CFG.STARTER_CR_MAX)) return;
  const hardest = novice.slice().sort((a, b) => b.cr - a.cr)[0];
  if (!hardest) return;
  state.jobBoard = state.jobBoard.filter(j => j.id !== hardest.id);
  const taken = state.jobBoard.filter(j => j.tier === 0).map(j => j.name);
  state.jobBoard.push(genJob(0, now, taken, j => j.cr <= CFG.STARTER_CR_MAX));
}

// Drop expired postings and top every tier back up to JOBS_PER_TIER.
// Returns true if the board changed.
function refreshJobBoard(now) {
  const before = state.jobBoard.map(j => j.id).join(',');
  state.jobBoard = state.jobBoard.filter(j => j.expires > now);
  for (let tier = 0; tier < JOB_TIERS.length; tier++) {
    while (state.jobBoard.filter(j => j.tier === tier).length < CFG.JOBS_PER_TIER) {
      const taken = state.jobBoard.filter(j => j.tier === tier).map(j => j.name);
      state.jobBoard.push(genJob(tier, now, taken));
    }
  }
  ensureNoviceStarter(now);
  const changed = state.jobBoard.map(j => j.id).join(',') !== before;
  if (changed) log('📋 The job board turns over — new postings are up.');
  return changed;
}

/* ---------- relics: generation, effects, shop, equipping ---------- */
function makeRelic(key) {
  const t = RELICS[key];
  return { id: uid(), key, tier: t.tier, equippedBy: null, charges: t.ward || 0 };
}
function randomRelic(tier) { return makeRelic(choice(relicsByTier(tier))); }

// weighted random tier from a { common, magic, rare, legendary } weight map
function weightedTier(weights) {
  const total = RELIC_TIER_ORDER.reduce((s, t) => s + (weights[t] || 0), 0);
  let r = Math.random() * total;
  for (const t of RELIC_TIER_ORDER) { r -= (weights[t] || 0); if (r <= 0) return t; }
  return 'common';
}
// relic-tier odds for a mission drop, based on how hard the mission is
function tierWeightsForCR(cr) {
  if (cr < 150) return { common: 70, magic: 28, rare: 2,  legendary: 0 };
  if (cr < 320) return { common: 40, magic: 45, rare: 14, legendary: 1 };
  if (cr < 550) return { common: 12, magic: 45, rare: 38, legendary: 5 };
  if (cr < 800) return { common: 3,  magic: 27, rare: 55, legendary: 15 };
  return              { common: 0,  magic: 12, rare: 53, legendary: 35 };
}
function rollRelicDrop(cr, success) {
  const chance = CFG.RELIC_DROP_CHANCE * (success ? 1 : CFG.RELIC_FAIL_DROP_MULT);
  if (Math.random() > chance) return null;
  return randomRelic(weightedTier(tierWeightsForCR(cr)));
}

const heroRelic = h => (h ? state.relics.find(r => r.equippedBy === h.id) || null : null);
function destroyRelic(id) {
  const i = state.relics.findIndex(r => r.id === id);
  if (i >= 0) state.relics.splice(i, 1);
}
// aggregate the party's equipped passive relic effects (rating/success/gold/partyXp/duration)
function relicAgg(heroes) {
  let rating = 0, success = 0, gold = 0, partyXp = 0, duration = 1;
  heroes.forEach(h => {
    const r = heroRelic(h); if (!r) return;
    const t = RELICS[r.key];
    rating += (t.rating || 0) + (t.partyRating || 0);
    success += (t.success || 0);
    gold += (t.gold || 0);
    partyXp += (t.partyXp || 0);
    duration *= (t.duration || 1);
  });
  return { rating, success, gold, partyXp, duration };
}

function equipRelic(relicId, heroId) {
  const r = state.relics.find(x => x.id === relicId);
  const h = heroById(heroId);
  if (!r || !h || h.status === 'mission' || h.status === 'dead') return;
  const cur = heroRelic(h);
  if (cur && cur.id !== r.id) cur.equippedBy = null; // swap out the old one
  r.equippedBy = heroId;
  log(`🎽 ${h.name} equipped ${RELICS[r.key].icon} ${RELICS[r.key].name}.`);
  save();
}
function unequipRelic(relicId) {
  const r = state.relics.find(x => x.id === relicId);
  if (!r || !r.equippedBy) return;
  const h = heroById(r.equippedBy);
  if (h && h.status === 'mission') return; // locked while on a mission
  r.equippedBy = null;
  save(); render();
}
function relicSellValue(r) { return Math.max(1, Math.round(CFG.RELIC_PRICE[r.tier] * CFG.RELIC_SELL_FRAC)); }
function sellRelic(relicId) {
  const r = state.relics.find(x => x.id === relicId);
  if (!r || r.equippedBy) return; // must be unequipped
  const val = relicSellValue(r);
  state.gold += val;
  destroyRelic(relicId);
  log(`⚱ Sold ${RELICS[r.key].icon} ${RELICS[r.key].name} for ${val} gold.`);
  save(); render();
}

/* ---------- the Reliquary (relic shop) ---------- */
function shopTierWeights() {
  const lvl = highestHeroLevel();
  if (lvl < 5)  return { common: 60, magic: 35, rare: 5,  legendary: 0 };
  if (lvl < 10) return { common: 30, magic: 45, rare: 23, legendary: 2 };
  if (lvl < 15) return { common: 10, magic: 40, rare: 42, legendary: 8 };
  return              { common: 2,  magic: 25, rare: 53, legendary: 20 };
}
function refreshShop(now) {
  const weights = shopTierWeights();
  const stock = [];
  for (let i = 0; i < CFG.SHOP_STOCK_SIZE; i++) {
    const key = choice(relicsByTier(weightedTier(weights)));
    stock.push({ key, price: CFG.RELIC_PRICE[RELICS[key].tier] });
  }
  state.shop = { relics: stock, expires: now + rnd(CFG.SHOP_LIFETIME_MIN_H, CFG.SHOP_LIFETIME_MAX_H) * H };
}
function autoRefreshShop(now) {
  if (state.shop && now < (state.shop.expires || 0)) return false;
  refreshShop(now);
  log('⚱ The Reliquary keeper lays out fresh stock.');
  return true;
}

// small roman numeral for charter numbering (1..20, plenty for ascensions)
function roman(n) {
  const map = [[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  let out = '', x = Math.max(1, Math.floor(n));
  for (const [v, s] of map) while (x >= v) { out += s; x -= v; }
  return out;
}

// Start a fresh charter. `carry` (optional) = { guildName, tabard, renown, legacy }
// preserved across a retirement; a genuinely new game passes nothing.
function initNewGame(now, carry) {
  state = defaultState(now);
  if (carry) { state.guildName = carry.guildName; state.tabard = carry.tabard; state.renown = carry.renown; state.legacy = carry.legacy; }
  // starter party: one tank, one healer, two DPS at the guild's hero floor level
  const lvl = heroFloorLevel();
  state.heroes.push(newHero(choice(classesOfRole('tank')), lvl));
  state.heroes.push(newHero(choice(classesOfRole('healer')), lvl));
  state.heroes.push(newHero(choice(classesOfRole('dps')), lvl));
  state.heroes.push(newHero(choice(classesOfRole('dps')), lvl));
  state.gold = CFG.STARTING_GOLD + (legacyValue('deep_coffers') || 0);
  refreshRecruitPool();
  state.relics.push(makeRelic('dagger')); // a first relic to introduce the system
  const qm = legacyValue('quartermaster');
  if (qm) state.relics.push(randomRelic(qm)); // Quartermaster: a bonus starter relic
  refreshShop(now);
  if (carry) {
    log(`⚜ Charter ${roman(state.legacy.ascensions + 1)} — ${state.guildName} is founded anew. The legend continues.`);
  } else {
    log('The guild charter is signed. Four hopefuls answer the call. LFG.');
    log('🗡️ A guild patron gifts you an Iron Dagger — equip it on the Inventory tab.');
  }
  refreshJobBoard(now);
  save();
}

// Prestige: retire a completed charter and found a new one, carrying identity,
// renown, and legacy (+ a fresh Legacy point) into the next generation.
function retireCharter() {
  if (!charterEligible() || state.activeMissions.length > 0) return;
  const carry = {
    guildName: state.guildName,
    tabard: state.tabard,
    renown: state.renown,
    legacy: {
      points: state.legacy.points + CFG.LEGACY_PER_RETIREMENT,
      ascensions: state.legacy.ascensions + 1,
      perks: Object.assign({}, state.legacy.perks),
    },
  };
  initNewGame(Date.now(), carry);
  log(`🏆 +${CFG.LEGACY_PER_RETIREMENT} Legacy earned. Spend it at the Keep.`);
  // clear transient UI so the new charter opens cleanly on the Keep
  // (state.briefings is already reset by defaultState via initNewGame)
  ui.awayMsgs = null;
  ui.picker = null; ui.picked = [];
  ui.heroPicker = null;
  ui.legacyShop = false;
  ui.confirmRetire = false;
  ui.view = 'keep';
  save();
}

/* =====================================================================
 *  SAVE / LOAD
 * ===================================================================== */
function save() {
  state.lastSeen = Date.now();
  try { localStorage.setItem(CFG.SAVE_KEY, JSON.stringify(state)); } catch (e) { /* storage unavailable */ }
}

function load() {
  try {
    const raw = localStorage.getItem(CFG.SAVE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (!s || s.v !== 1 || !Array.isArray(s.heroes)) return false;
    state = s;
    return true;
  } catch (e) { return false; }
}

/* =====================================================================
 *  DERIVED VALUES & RULES
 * ===================================================================== */
const heroById = id => state.heroes.find(h => h.id === id);
const rosterCap = () => CFG.ROSTER_BASE + (state.keepLevel - 1) * CFG.ROSTER_PER_KEEP_LEVEL;
const trainSlots = () => CFG.TRAIN_SLOTS_BASE + (state.keepLevel - 1) * CFG.TRAIN_SLOTS_PER_KEEP_LEVEL;
const livingHeroes = () => state.heroes.filter(h => h.status !== 'dead');
const idleHeroes = () => state.heroes.filter(h => h.status === 'idle');
const highestHeroLevel = () => livingHeroes().reduce((m, h) => Math.max(m, h.level), 0);
// a job tier is visible once the guild's best hero clears its minimum level
const jobTierUnlocked = tier => highestHeroLevel() >= (CFG.JOB_TIER_MIN_LEVEL[tier] || 1);

// --- the Keep's passive income (accrues from state.lastCollect, capped) ---
const incomeRate = () => CFG.KEEP_INCOME_PER_H + (state.keepLevel - 1) * CFG.KEEP_INCOME_PER_LEVEL_H;
const accruedIncome = now => Math.floor(incomeRate() * Math.min(now - state.lastCollect, CFG.KEEP_INCOME_CAP_H * H) / H);

// --- renown & guild rank ---
// index of the highest GUILD_RANKS entry the guild's current renown has reached
function rankIdx() {
  let idx = 0;
  for (let i = 0; i < GUILD_RANKS.length; i++) if (GUILD_RANKS[i].at <= state.renown) idx = i;
  return idx;
}
const guildRank = () => GUILD_RANKS[rankIdx()];
const nextRank = () => GUILD_RANKS[rankIdx() + 1] || null;

// Reconstruct story renown for saves migrated from before renown existed, from
// existing campaign progress. Practice-mission renown can't be reconstructed
// (no history of past job-board runs is kept) — that's accepted.
function retroactiveRenown() {
  let r = 0;
  state.campaigns.forEach((cleared, c) => {
    const missions = CAMPAIGNS[c].missions;
    for (let i = 0; i < cleared; i++) {
      r += Math.round(missions[i].cr * CFG.RENOWN_PER_CR * CFG.RENOWN_STORY_MULT) + CFG.RENOWN_FIRST_CLEAR;
    }
    if (cleared === 5) r += CFG.RENOWN_CAMPAIGN_COMPLETE;
  });
  return r;
}

// --- legacy / prestige perks ---
// owned tier count for a perk (0 = not owned)
const legacyTier = key => state.legacy.perks[key] || 0;
// the magnitude of the owned tier, or null if unowned
function legacyValue(key) {
  const tier = legacyTier(key);
  if (!tier) return null;
  return LEGACY_PERKS[key].tiers[tier - 1].value;
}
// minimum level any new hero starts at (Veteran Blood floors it)
const heroFloorLevel = () => Math.max(CFG.STARTER_LEVEL, legacyValue('veteran_blood') || 0);
// training XP per hour, boosted by Drillmaster
const trainingRate = () => CFG.TRAINING_XP_PER_HOUR * (1 + (legacyValue('drillmaster') || 0));
// the charter can be retired once the final campaign is complete
const charterEligible = () => state.campaigns[3] === 5;

const xpToNext = lvl => CFG.XP_PER_LEVEL_STEP * lvl;
const heroRating = h => h.level * CFG.RATING_PER_LEVEL + h.talent;
const countClass = (heroes, cls) => heroes.filter(h => h.cls === cls).length;

function partyRating(heroes) {
  let r = heroes.reduce((s, h) => s + heroRating(h), 0);
  r += powerAgg(heroes).ratingFlat;
  r += relicAgg(heroes).rating;
  return r;
}

function successChance(heroes, cr) {
  const r = partyRating(heroes);
  const agg = powerAgg(heroes);
  let p = CFG.SUCCESS_BASE + (r / cr - 1) * CFG.SUCCESS_SLOPE;
  p += agg.successFlat;
  if (cr > r) p += agg.underdog;
  p += relicAgg(heroes).success;
  return clamp(p, CFG.SUCCESS_MIN, CFG.SUCCESS_MAX);
}

// per-hero injury chance for a given hero in a given party & outcome
function injuryChance(heroes, hero, cr, failed) {
  const r = partyRating(heroes);
  let p = CFG.INJURY_BASE + (cr / r - 1) * CFG.INJURY_SLOPE;
  p = clamp(p, CFG.INJURY_MIN, CFG.INJURY_MAX);
  p *= powerAgg(heroes).partyInjuryMult;
  if (failed) p *= CFG.FAIL_INJURY_MULT;
  const hp = heroPower(hero);
  if (hp) {
    if (hp.selfInjuryMult != null) p *= hp.selfInjuryMult;
    if (hp.selfImmuneOnSuccess && !failed) p = 0;
  }
  const rel = heroRelic(hero); if (rel) p *= (RELICS[rel.key].injuryReduce || 1);
  return clamp(p, 0, 0.95);
}

function missionDurationMs(hours, heroes) {
  return hours * H * powerAgg(heroes).durationMult * relicAgg(heroes).duration;
}

// failed-mission payout fraction, improved by salvage powers (e.g. Nature's Bounty)
function failFraction(baseFrac, heroes) {
  const f = baseFrac * powerAgg(heroes).salvageMult;
  return Math.min(CFG.SALVAGE_CAP, f);
}

// +X% gold & XP per hero beyond the 4-hero core
function partySizeBonus(heroes) {
  return 1 + Math.max(0, heroes.length - 4) * CFG.PARTY_SIZE_REWARD_BONUS;
}

function missionGoldReward(cr, story, heroes, success) {
  let g = cr * CFG.GOLD_PER_CR * (story ? CFG.STORY_GOLD_MULT : 1);
  g *= 1 + (powerAgg(heroes).goldPct + relicAgg(heroes).gold);
  g *= 1 + (legacyValue('ledger') || 0); // Guildmaster's Ledger: legacy gold bonus
  g *= partySizeBonus(heroes);
  if (!success) g *= failFraction(CFG.FAIL_GOLD_FRAC, heroes);
  return Math.round(g);
}

function missionXpReward(cr, story, heroes, hero, success) {
  let x = cr * CFG.XP_PER_CR * (story ? CFG.STORY_XP_MULT : 1);
  x *= 1 + powerAgg(heroes).partyXpPct + relicAgg(heroes).partyXp;
  x *= partySizeBonus(heroes);
  const hp = heroPower(hero); if (hp && hp.selfXpMult != null) x *= hp.selfXpMult;
  const rel = heroRelic(hero); if (rel) x *= 1 + (RELICS[rel.key].xp || 0);
  if (!success) x *= failFraction(CFG.FAIL_XP_FRAC, heroes);
  return Math.round(x);
}

function gainXP(hero, amount) {
  if (hero.status === 'dead' || hero.level >= CFG.LEVEL_CAP) return;
  hero.xp += amount;
  while (hero.level < CFG.LEVEL_CAP && hero.xp >= xpToNext(hero.level)) {
    hero.xp -= xpToNext(hero.level);
    hero.level++;
    log(`⭐ ${hero.name} the ${hero.cls} reached level ${hero.level}.`);
  }
  if (hero.level >= CFG.LEVEL_CAP) hero.xp = 0;
}

function infirmaryCost(hero) {
  return CFG.INFIRMARY_BASE_COST + hero.level * CFG.INFIRMARY_COST_PER_LEVEL;
}

function log(msg) {
  state.log.push({ t: Date.now(), msg });
  if (state.log.length > CFG.LOG_LIMIT) state.log.splice(0, state.log.length - CFG.LOG_LIMIT);
}

/* =====================================================================
 *  ACTIONS
 * ===================================================================== */
function startMission(def, heroIds, story) {
  const heroes = heroIds.map(heroById);
  const now = Date.now();
  const dur = missionDurationMs(def.hours, heroes);
  const m = {
    id: uid(), name: def.name, cr: def.cr, flavor: def.flavor,
    start: now, end: now + dur, heroIds: heroIds.slice(), story: story || null,
  };
  heroes.forEach(h => h.status = 'mission');
  state.activeMissions.push(m);
  log(`⚔ A party set out on “${def.name}” (CR ${def.cr}).`);
  save();
}

function resolveMission(m, endTime) {
  const heroes = m.heroIds.map(heroById).filter(Boolean);
  const cr = m.cr, story = !!m.story;
  const success = Math.random() < successChance(heroes, cr);

  const gold = missionGoldReward(cr, story, heroes, success);
  state.gold += gold;

  // renown: permanent guild fame, cosmetic-only (gates rank/tabard unlocks)
  let ren = Math.round(cr * CFG.RENOWN_PER_CR * (story ? CFG.RENOWN_STORY_MULT : 1));
  if (!success) ren = Math.round(ren * CFG.RENOWN_FAIL_FRAC);
  ren = Math.round(ren * (1 + (legacyValue('herald') || 0))); // Renown Herald: legacy renown bonus

  const recoveryMs = CFG.INJURY_DURATION_H * H * powerAgg(heroes).recoveryMult * (1 - (legacyValue('field_medicine') || 0));

  // Aegis: any wardParty relic shields the whole party from injury this mission,
  // then is consumed regardless of whether anyone would have been hurt.
  const relicEvents = [], consumed = [];
  const partyShielded = heroes.some(h => { const r = heroRelic(h); return r && RELICS[r.key].wardParty; });
  if (partyShielded) heroes.forEach(h => {
    const r = heroRelic(h);
    if (r && RELICS[r.key].wardParty) { consumed.push(r.id); relicEvents.push({ type: 'aegis', name: h.name, relic: RELICS[r.key].name }); }
  });

  const hurt = [], fallen = [], leveled = [];
  heroes.forEach(h => {
    const lvlBefore = h.level;
    gainXP(h, missionXpReward(cr, story, heroes, h, success));
    if (h.level > lvlBefore) leveled.push({ name: h.name, cls: h.cls, level: h.level });

    const wouldBeInjured = Math.random() < injuryChance(heroes, h, cr, !success);
    if (!wouldBeInjured || partyShielded) { if (h.status === 'mission') h.status = 'idle'; return; }

    const rel = heroRelic(h);
    // consumable ward absorbs the wound
    if (rel && RELICS[rel.key].ward && rel.charges > 0) {
      rel.charges--;
      relicEvents.push({ type: 'block', name: h.name, relic: RELICS[rel.key].name });
      if (rel.charges <= 0) { consumed.push(rel.id); relicEvents.push({ type: 'break', name: h.name, relic: RELICS[rel.key].name }); }
      if (h.status === 'mission') h.status = 'idle';
      return;
    }
    // a real wound
    h.marks++;
    if (h.marks >= CFG.MAX_MARKS) {
      if (rel && RELICS[rel.key].revive) { // Phoenix Feather cheats death, then breaks
        h.marks = CFG.MAX_MARKS - 1;
        h.status = 'injured';
        h.injuredUntil = endTime + recoveryMs;
        hurt.push(h.name);
        consumed.push(rel.id);
        relicEvents.push({ type: 'revive', name: h.name, relic: RELICS[rel.key].name });
      } else {
        const dr = heroRelic(h); if (dr) dr.equippedBy = null; // fallen hero's relic returns to inventory
        h.status = 'dead';
        fallen.push(h.name);
      }
    } else {
      h.status = 'injured';
      h.injuredUntil = endTime + recoveryMs;
      hurt.push(h.name);
    }
  });

  consumed.forEach(id => destroyRelic(id));
  state.activeMissions = state.activeMissions.filter(x => x.id !== m.id);

  // relic loot & campaign rewards
  const drops = [];
  const loot = rollRelicDrop(cr, success);
  if (loot) { state.relics.push(loot); drops.push(loot); }

  let campaignComplete = null, campaignNext = null;
  if (success && m.story) {
    const c = m.story.c, i = m.story.i;
    if (state.campaigns[c] === i) {
      state.campaigns[c] = i + 1;
      ren += CFG.RENOWN_FIRST_CLEAR;
      const reward = randomRelic(weightedTier(CFG.CAMPAIGN_RELIC_WEIGHTS[c])); // first-clear reward
      state.relics.push(reward); drops.push(reward);
      if (state.campaigns[c] === 5) {
        campaignComplete = CAMPAIGNS[c].name;
        campaignNext = c + 1 < CAMPAIGNS.length ? CAMPAIGNS[c + 1].name : null;
        ren += CFG.RENOWN_CAMPAIGN_COMPLETE;
        const legend = randomRelic('legendary'); // campaign completion bonus
        state.relics.push(legend); drops.push(legend);
        log(`🏆 Campaign complete: “${campaignComplete}”!` + (campaignNext ? ` “${campaignNext}” is now open.` : ' Your guild’s legend is complete.'));
      }
    }
  }

  const rankBefore = rankIdx();
  state.renown += ren;
  const rankedUp = rankIdx() > rankBefore ? guildRank().name : null;

  const per = heroes.length ? missionXpReward(cr, story, heroes, representativeHero(heroes), success) : 0;
  log(`${success ? '✅ Victory' : '❌ Failure'} — “${m.name}”: +${gold} gold, ~${per} XP each, +${ren} renown.`);
  if (rankedUp) log(`🏅 The realm takes notice — ${state.guildName || 'the guild'} is now “${rankedUp}”!`);
  relicEvents.forEach(ev => log(relicEventLog(ev)));
  hurt.forEach(n => log(`🩹 ${n} was injured (out ${fmtDur(recoveryMs)}, +1 mark).`));
  fallen.forEach(n => log(`☠ ${n} has died of their wounds. The guild will remember.`));
  drops.forEach(d => log(`🎁 Relic acquired: ${RELICS[d.key].icon} ${RELICS[d.key].name} (${RELIC_TIERS[d.tier].name}).`));

  // queue a briefing for the player to read when they next look at the screen
  state.briefings.push({
    name: m.name, story, success, gold, xpEach: per,
    partySize: heroes.length,
    recoveryTxt: fmtDur(recoveryMs),
    injured: hurt.slice(), fallen: fallen.slice(), leveled,
    relicEvents, relicDrops: drops.map(d => ({ name: RELICS[d.key].name, icon: RELICS[d.key].icon, tier: d.tier })),
    campaignComplete, campaignNext,
    renown: ren, rankUp: rankedUp,
  });
}

function relicEventLog(ev) {
  switch (ev.type) {
    case 'block':  return `🛡️ ${ev.name}'s ${ev.relic} turned aside a wound.`;
    case 'break':  return `💥 ${ev.name}'s ${ev.relic} shattered, its charges spent.`;
    case 'revive': return `🪶 ${ev.name} fell — but ${ev.relic} burned away and pulled them back.`;
    case 'aegis':  return `✨ ${ev.relic} shielded the whole party, then broke.`;
  }
  return '';
}

function assignTraining(heroId) {
  if (state.training.length >= trainSlots()) return;
  const h = heroById(heroId);
  if (!h || h.status !== 'idle') return;
  const now = Date.now();
  h.status = 'training';
  state.training.push({ heroId, start: now, end: now + CFG.TRAINING_CAP_H * H });
  log(`🎓 ${h.name} began training at the Keep.`);
  save();
}

function trainingXpSoFar(t, now) {
  const elapsed = Math.min(now, t.end) - t.start;
  return Math.floor((elapsed / H) * trainingRate());
}

function finishTraining(t, endTime) {
  const h = heroById(t.heroId);
  const xp = trainingXpSoFar(t, endTime);
  state.training = state.training.filter(x => x !== t);
  if (h && h.status === 'training') {
    h.status = 'idle';
    gainXP(h, xp);
    log(`🎓 ${h.name} finished training (+${xp} XP).`);
  }
}

function recallTraining(heroId) {
  const t = state.training.find(x => x.heroId === heroId);
  if (t) { finishTraining(t, Date.now()); save(); render(); }
}

function assignRest(heroId) {
  const h = heroById(heroId);
  if (!h || h.status !== 'idle' || h.marks <= 0) return;
  const now = Date.now();
  h.status = 'resting';
  state.rests.push({ heroId, start: now, end: now + CFG.REST_DURATION_H * H });
  log(`🛌 ${h.name} was sent to rest and recover.`);
  save();
}

function finishRest(r) {
  const h = heroById(r.heroId);
  state.rests = state.rests.filter(x => x !== r);
  if (h && h.status === 'resting') {
    h.status = 'idle';
    h.marks = Math.max(0, h.marks - 1);
    log(`🛌 ${h.name} is fully rested — one injury mark removed.`);
  }
}

function cancelRest(heroId) {
  const r = state.rests.find(x => x.heroId === heroId);
  const h = heroById(heroId);
  if (r) {
    state.rests = state.rests.filter(x => x !== r);
    if (h && h.status === 'resting') h.status = 'idle';
    log(`${h ? h.name : 'A hero'} cut their rest short — no mark removed.`);
    save(); render();
  }
}

function healMark(heroId) {
  const h = heroById(heroId);
  if (!h || h.marks <= 0 || h.status === 'dead') return;
  const cost = infirmaryCost(h);
  if (state.gold < cost) return;
  state.gold -= cost;
  h.marks--;
  log(`⚕ The Infirmary treated ${h.name} for ${cost} gold — one mark removed.`);
  save(); render();
}

function recruitHero(idx) {
  const r = state.recruits[idx];
  if (!r) return;
  if (livingHeroes().length >= rosterCap()) return;
  if (state.gold < r.cost) return;
  state.gold -= r.cost;
  state.recruits.splice(idx, 1);
  const cost = r.cost;
  delete r.cost;
  state.heroes.push(r);
  log(`🍺 Recruited ${r.name}, level ${r.level} ${r.cls}, for ${cost} gold.`);
  save(); render();
}

function payRefreshRecruits() {
  if (state.gold < CFG.RECRUIT_REFRESH_COST) return;
  state.gold -= CFG.RECRUIT_REFRESH_COST;
  refreshRecruitPool();
  log(`🍺 New faces drift into the Tavern.`);
  save(); render();
}

// Auto-reshuffle the hire board on its own timer (called from tick/boot).
function autoRefreshRecruits(now) {
  if (now < (state.recruitsExpire || 0)) return false;
  refreshRecruitPool();
  log('🍺 The old hopefuls wander off; new adventurers arrive at the Tavern.');
  return true;
}

function foundGuild(name) {
  const clean = (name || '').trim().slice(0, 40) || genGuildName();
  state.guildName = clean;
  log(`🏰 The ${clean} is founded. May its name outlive us all.`);
  save();
}

function renameGuild(name) {
  const clean = (name || '').trim().slice(0, 40);
  if (!clean || clean === state.guildName) return false;
  if (state.gold < CFG.GUILD_RENAME_COST) return false;
  state.gold -= CFG.GUILD_RENAME_COST;
  const old = state.guildName;
  state.guildName = clean;
  log(`🏰 “${old}” is now known as “${clean}” (${CFG.GUILD_RENAME_COST} gold in new banners and seals).`);
  save();
  return true;
}

// Remove a hero from the guild entirely (not death — a dismissal).
function dismissHero(heroId) {
  const h = heroById(heroId);
  if (!h) return;
  if (['mission', 'training', 'resting'].includes(h.status)) return; // must be free
  const rel = heroRelic(h); if (rel) rel.equippedBy = null; // relic stays with the guild
  state.heroes = state.heroes.filter(x => x.id !== heroId);
  log(`👋 ${h.name} the ${h.cls} was dismissed from the guild.`);
  save();
}

/* ---------- backup & restore ---------- */
// The current save as a JSON string (flushes state to storage first).
function exportSaveText() {
  save();
  return localStorage.getItem(CFG.SAVE_KEY) || JSON.stringify(state);
}

// Validate & adopt an imported save string. Returns { ok, msg }.
// Runs the same normalization/offline-catch-up as boot so any save loads cleanly.
function applyImport(text) {
  let s;
  try { s = JSON.parse(text); }
  catch (e) { return { ok: false, msg: 'That is not valid save text.' }; }
  if (!s || typeof s !== 'object' || s.v !== 1 || !Array.isArray(s.heroes)) {
    return { ok: false, msg: 'This does not look like an LFG save.' };
  }
  state = s;
  const now = Date.now();
  // normalize / migrate, mirroring boot()
  if (!Array.isArray(state.jobBoard)) state.jobBoard = [];
  if (typeof state.guildName !== 'string') state.guildName = '';
  if (typeof state.gold !== 'number') state.gold = 0;
  if (!Array.isArray(state.relics)) state.relics = [];
  if (!state.shop || !Array.isArray(state.shop.relics)) state.shop = { relics: [], expires: 0 };
  if (state.tabard === undefined) state.tabard = null;
  if (typeof state.renown !== 'number') state.renown = retroactiveRenown();
  if (!state.legacy || typeof state.legacy !== 'object' || !state.legacy.perks) state.legacy = { points: 0, ascensions: 0, perks: {} };
  if (typeof state.lastCollect !== 'number') state.lastCollect = Date.now();
  if (!Array.isArray(state.briefings)) state.briefings = [];
  if (!state.nextId) state.nextId = Math.max(0, ...state.heroes.map(h => h.id || 0)) + 1;
  state.heroes.forEach(ensureHeroPower);
  (state.recruits || []).forEach(ensureHeroPower);
  processEvents(now);
  if (!Array.isArray(state.recruits) || !state.recruits.length) refreshRecruitPool();
  autoRefreshRecruits(now);
  autoRefreshShop(now);
  if (!state.shop.relics.length) refreshShop(now);
  refreshJobBoard(now);
  if (!state.guildName) ui.naming = 'found';
  save();
  log('📥 Save data imported.');
  return { ok: true };
}

// Update a small status line inside a modal without re-rendering (preserves textareas).
function setStatus(id, msg, isErr) {
  const el = $(id);
  if (el) { el.textContent = msg; el.className = 'sub ' + (isErr ? 'red' : 'green'); }
}

function upgradeKeep() {
  if (state.keepLevel >= CFG.KEEP_MAX_LEVEL) return;
  const cost = CFG.KEEP_UPGRADE_COSTS[state.keepLevel - 1];
  if (state.gold < cost) return;
  state.gold -= cost;
  state.keepLevel++;
  log(`🏰 The Keep was expanded to level ${state.keepLevel}. Roster cap ${rosterCap()}, training slots ${trainSlots()}.`);
  save(); render();
}

/* =====================================================================
 *  TIME & OFFLINE RESOLUTION
 *  Everything pending is processed in chronological order so log
 *  entries and knock-on effects (e.g. injuries from a mission that
 *  ended hours ago) resolve correctly.
 * ===================================================================== */
function pendingEvents(now) {
  const ev = [];
  state.activeMissions.forEach(m => { if (m.end <= now) ev.push({ t: m.end, fn: () => resolveMission(m, m.end) }); });
  state.training.forEach(t => { if (t.end <= now) ev.push({ t: t.end, fn: () => finishTraining(t, t.end) }); });
  state.rests.forEach(r => { if (r.end <= now) ev.push({ t: r.end, fn: () => finishRest(r) }); });
  state.heroes.forEach(h => {
    if (h.status === 'injured' && h.injuredUntil <= now) {
      ev.push({ t: h.injuredUntil, fn: () => { h.status = 'idle'; log(`💪 ${h.name} has recovered and is ready for duty.`); } });
    }
  });
  return ev;
}

function processEvents(now) {
  let count = 0;
  for (;;) {
    const ev = pendingEvents(now);
    if (!ev.length) break;
    ev.sort((a, b) => a.t - b.t);
    ev[0].fn();
    count++;
    if (count > 500) break; // safety valve
  }
  if (count) save();
  return count;
}

/* =====================================================================
 *  FORMATTING
 * ===================================================================== */
function fmtDur(ms) {
  ms = Math.max(0, ms);
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  return `${m}:${String(sec).padStart(2, '0')}`;
}
function fmtHours(hours) {
  if (hours >= 1) return (hours % 1 === 0 ? hours : hours.toFixed(1)) + 'h';
  return Math.round(hours * 60) + 'm';
}
function fmtWhen(t) {
  const d = new Date(t);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}
function chanceClass(p) { return p >= 0.75 ? 'green' : p >= 0.45 ? 'yellow' : 'red'; }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
// escape a string for safe embedding inside a single-quoted HTML attribute (e.g. inline onclick JSON)
function escAttr(s) { return String(s).replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

function render() {

function renderHeader() {
  const chips = [];
  state.activeMissions.forEach(m => chips.push(`<span class="chip">⚔ <b>${esc(m.name)}</b> <span class="cd" data-cd="${m.end}"></span></span>`));
  state.training.forEach(t => { const h = heroById(t.heroId); if (h) chips.push(`<span class="chip">🎓 <b>${esc(h.name.split(' ')[0])}</b> <span class="cd" data-cd="${t.end}"></span></span>`); });
  state.rests.forEach(r => { const h = heroById(r.heroId); if (h) chips.push(`<span class="chip">🛌 <b>${esc(h.name.split(' ')[0])}</b> <span class="cd" data-cd="${r.end}"></span></span>`); });
  state.heroes.forEach(h => { if (h.status === 'injured') chips.push(`<span class="chip">🩹 <b>${esc(h.name.split(' ')[0])}</b> <span class="cd" data-cd="${h.injuredUntil}"></span></span>`); });
  $('header').innerHTML = `
    <div class="brand">⚜ LFG<small>${state.guildName ? esc(state.guildName) : 'guildmaster'}</small>${state.guildName ? `<small style="font-size:10px; color:var(--muted)">${esc(guildRank().name)}</small>` : ''}</div>
    <div class="goldbox">🪙 ${state.gold}</div>
    <div class="timers">${chips.join('') || '<span class="chip">All quiet — everyone is home.</span>'}</div>

function renderNav() {

  $('nav').innerHTML = tabs.map(([k, label]) =>
    `<button class="${ui.view === k ? 'active' : ''}" onclick="A.setView('${k}')">${label}</button>`).join('');
}

/* ---------- hero card bits ---------- */
function marksHtml(h) {
  let s = '';
  for (let i = 0; i < CFG.MAX_MARKS; i++) s += i < h.marks ? '<span class="red">●</span>' : '<span style="color:#4a4234">○</span>';
  return `<span class="marks" title="Injury marks — ${CFG.MAX_MARKS} means death">${s}</span>`;
}

function heroStatusHtml(h) {
  switch (h.status) {
    case 'idle': return '<span class="green">Ready</span>';
    case 'mission': {
      const m = state.activeMissions.find(m => m.heroIds.includes(h.id));
      return m ? `<span class="blue">On “${esc(m.name)}”</span> <span class="cd" data-cd="${m.end}"></span>` : 'On a mission';
    }
    case 'training': {
      const t = state.training.find(t => t.heroId === h.id);
      return t ? `<span class="blue">Training</span> <span class="cd" data-cd="${t.end}"></span>` : 'Training';
    }
    case 'resting': {
      const r = state.rests.find(r => r.heroId === h.id);
      return r ? `<span class="yellow">Resting</span> <span class="cd" data-cd="${r.end}"></span>` : 'Resting';
    }
    case 'injured': return `<span class="red">Injured</span> <span class="cd" data-cd="${h.injuredUntil}"></span>`;
    case 'dead': return '<span class="red">☠ Fallen</span>';
  }
  return h.status;
}

function heroCard(h, actions) {
  const c = CLASSES[h.cls];
  const need = xpToNext(h.level);
  const xpBar = h.level >= CFG.LEVEL_CAP
    ? '<div class="sub">Max level</div>'
    : `<div class="bar"><div style="width:${Math.min(100, h.xp / need * 100)}%"></div></div>
       <div class="sub">${h.xp} / ${need} XP</div>`;
  return `<div class="card">
    <div class="spread">
      <div><b>${esc(h.name)}</b> <span class="sub">Lv ${h.level}</span></div>
      <div><span class="tag ${c.role}">${ROLE_ICON[c.role]} ${h.cls}</span></div>
    </div>
    <div class="spread" style="margin-top:2px">
      <span class="sub">Rating <b class="gold-t">${heroRating(h)}</b> · Talent +${h.talent}</span>
      ${marksHtml(h)}
    </div>
    ${xpBar}
    <div style="margin:4px 0">${heroStatusHtml(h)}</div>
    ${powerLineHtml(h)}
    ${relicLineHtml(h)}
    ${actions ? `<div class="row" style="margin-top:8px">${actions}</div>` : ''}
  </div>`;
}

// one-line summary of a hero's class power
function powerLineHtml(h) {
  const p = heroPower(h);
  return p ? `<div class="ability"><b>${esc(p.name)}:</b> ${esc(p.desc)}</div>` : '';
}

// one-line summary of a hero's equipped relic (or nothing)
function relicLineHtml(h) {
  const r = heroRelic(h);
  if (!r) return '';
  const t = RELICS[r.key];
  const ch = t.ward ? ` <span class="sub">(${r.charges}/${t.ward})</span>` : '';
  return `<div class="ability"><span class="${'q-' + r.tier}">${t.icon} ${esc(t.name)}</span>${ch} — <span class="sub">${relicEffectText(r.key)}</span></div>`;
}

// compact one-line relic summary for tight spaces (e.g. the party picker) — no effect text
function relicCompactHtml(h) {
  const r = heroRelic(h);
  if (!r) return '';
  const t = RELICS[r.key];
  const ch = t.ward ? ` (${r.charges}/${t.ward})` : '';
  return `<div class="sub"><span class="${'q-' + r.tier}">${t.icon} ${esc(t.name)}</span>${ch}</div>`;
}

function heroActions(h) {
  const acts = [];
  if (h.status === 'idle') {
    if (state.training.length < trainSlots())
      acts.push(`<button class="act" onclick="A.assignTraining(${h.id})">🎓 Train</button>`);
    if (h.marks > 0)
      acts.push(`<button class="act" onclick="A.assignRest(${h.id})">🛌 Rest (${CFG.REST_DURATION_H}h)</button>`);
  }
  if (h.status === 'training')
    acts.push(`<button class="ghost" onclick="A.recallTraining(${h.id})">Recall from training</button>`);
  if (h.status === 'resting')
    acts.push(`<button class="ghost" onclick="A.cancelRest(${h.id})">Cancel rest (no benefit)</button>`);
  if (h.marks > 0 && h.status !== 'dead') {
    const cost = infirmaryCost(h);
    acts.push(`<button class="act" ${state.gold < cost ? 'disabled' : ''} onclick="A.healMark(${h.id})">⚕ Heal mark — ${cost}g</button>`);
  }
  // relic management is allowed unless the hero is out on a mission
  if (h.status !== 'mission' && h.status !== 'dead') {
    acts.push(`<button class="ghost" onclick="A.openEquipHero(${h.id})">${heroRelic(h) ? '🎽 Change relic' : '🎽 Equip relic'}</button>`);
  }
  // can dismiss only heroes who aren't currently committed to something
  if (h.status === 'idle' || h.status === 'injured') {
    acts.push(`<button class="ghost" onclick="A.askDismiss(${h.id})">👋 Dismiss</button>`);
  }
  return acts.join('');
}

/* ---------- relic display helpers ---------- */
function relicEffectText(key) {
  const t = RELICS[key], bits = [];
  if (t.rating) bits.push(`+${t.rating} rating`);
  if (t.partyRating) bits.push(`+${t.partyRating} party rating`);
  if (t.success) bits.push(`+${pct(t.success)} party success`);
  if (t.gold) bits.push(`+${pct(t.gold)} mission gold`);
  if (t.xp) bits.push(`+${pct(t.xp)} bearer XP`);
  if (t.partyXp) bits.push(`+${pct(t.partyXp)} party XP`);
  if (t.injuryReduce) bits.push(`−${pct(1 - t.injuryReduce)} bearer injury chance`);
  if (t.duration) bits.push(`−${pct(1 - t.duration)} mission duration`);
  if (t.ward) bits.push(`blocks ${t.ward} injur${t.ward > 1 ? 'ies' : 'y'}, then breaks`);
  if (t.revive) bits.push('survives a lethal wound once, then breaks');
  if (t.wardParty) bits.push('whole party immune to injury for one mission, then breaks');
  return bits.join(' · ');
}
function relicCard(r, actions, opts) {
  const t = RELICS[r.key];
  const bearer = r.equippedBy ? heroById(r.equippedBy) : null;
  const ch = t.ward ? ` <span class="sub">(${r.charges}/${t.ward} charges)</span>` : '';
  const glow = t.tier === 'legendary' ? ' legendary-glow' : '';
  return `<div class="card${glow}">
    <div class="spread">
      <b class="${'q-' + t.tier}">${t.icon} ${esc(t.name)}</b>
      <span class="tag q-${t.tier}">${RELIC_TIERS[t.tier].name}</span>
    </div>
    <div class="ability">${relicEffectText(r.key)}${ch}</div>
    <div class="flavor">${esc(t.flavor)}</div>
    ${opts && opts.hideBearer ? '' : (bearer ? `<div class="sub">Equipped by <b>${esc(bearer.name)}</b></div>` : '<div class="sub">Unequipped</div>')}
    ${actions ? `<div class="row" style="margin-top:8px">${actions}</div>` : ''}
  </div>`;
}

/* ---------- guild tabard ---------- */
// Renders a heater-shield tabard as an inline SVG. `t` is {pattern,c1,c2,emblem} or
// null (renders a muted placeholder). A counter keeps clipPath ids unique across calls
// so two tabards rendered on the same page (e.g. Keep card + editor preview) don't collide.
let tabardClipCounter = 0;
const TABARD_SHIELD_PATH = 'M8 6 H92 V48 C92 78 50 104 50 104 C50 104 8 78 8 48 Z';
function tabardSvg(t, size) {
  const d = t || { pattern: 'solid', c1: '#3d3524', c2: '#3d3524', emblem: '' };
  const clipId = 'tabardClip' + (++tabardClipCounter);
  let fill;
  switch (d.pattern) {
    case 'pale':    fill = `<rect x="0" y="0" width="50" height="110" fill="${d.c1}"/><rect x="50" y="0" width="50" height="110" fill="${d.c2}"/>`; break;
    case 'fess':    fill = `<rect x="0" y="0" width="100" height="55" fill="${d.c1}"/><rect x="0" y="55" width="100" height="55" fill="${d.c2}"/>`; break;
    case 'bend':    fill = `<rect x="0" y="0" width="100" height="110" fill="${d.c1}"/><polygon points="0,0 100,0 100,110" fill="${d.c2}"/>`; break;
    case 'chevron': fill = `<rect x="0" y="0" width="100" height="110" fill="${d.c1}"/><polygon points="0,110 50,55 100,110" fill="${d.c2}"/>`; break;
    case 'quarter': fill = `<rect x="0" y="0" width="50" height="55" fill="${d.c1}"/><rect x="50" y="0" width="50" height="55" fill="${d.c2}"/><rect x="0" y="55" width="50" height="55" fill="${d.c2}"/><rect x="50" y="55" width="50" height="55" fill="${d.c1}"/>`; break;
    case 'paly':    fill = `<rect x="0" y="0" width="100" height="110" fill="${d.c1}"/><rect x="25" y="0" width="25" height="110" fill="${d.c2}"/><rect x="75" y="0" width="25" height="110" fill="${d.c2}"/>`; break;
    case 'cross':   fill = `<rect x="0" y="0" width="100" height="110" fill="${d.c1}"/><rect x="40" y="0" width="20" height="110" fill="${d.c2}"/><rect x="0" y="40" width="100" height="20" fill="${d.c2}"/>`; break;
    case 'bordure': fill = `<rect x="0" y="0" width="100" height="110" fill="${d.c2}"/><rect x="14" y="14" width="72" height="82" fill="${d.c1}"/>`; break;
    case 'saltire': fill = `<rect x="0" y="0" width="100" height="110" fill="${d.c1}"/><polygon points="0,0 18,0 100,92 100,110 82,110 0,18" fill="${d.c2}"/><polygon points="82,0 100,0 100,18 18,110 0,110 0,92" fill="${d.c2}"/>`; break;
    default:        fill = `<rect x="0" y="0" width="100" height="110" fill="${d.c1}"/>`; // solid
  }
  return `<svg viewBox="0 0 100 110" width="${size}" height="${Math.round(size * 1.1)}" xmlns="http://www.w3.org/2000/svg">
    <defs><clipPath id="${clipId}"><path d="${TABARD_SHIELD_PATH}"/></clipPath></defs>
    <g clip-path="url(#${clipId})">${fill}</g>
    <path d="${TABARD_SHIELD_PATH}" fill="none" stroke="#0d0b08" stroke-width="3"/>
    ${d.emblem ? `<text x="50" y="52" text-anchor="middle" dominant-baseline="central" font-size="34">${d.emblem}</text>` : ''}
  </svg>`;
}

// cosmetic unlock gating — compares each table's minRank against the guild's current rank
const patternUnlocked = key => TABARD_PATTERNS[key].minRank <= rankIdx();
const colorUnlocked = i => TABARD_COLOR_MIN_RANK[i] <= rankIdx();
const emblemUnlocked = i => TABARD_EMBLEM_MIN_RANK[i] <= rankIdx();

// renown & guild rank card — shown on the Keep, directly under the guild card
function renownCardHtml() {
  const idx = rankIdx(), rank = guildRank(), nr = nextRank();
  let html = `<div class="card">
    <div>⭐ Renown <b>${state.renown}</b> · <b class="gold-t">${esc(rank.name)}</b></div>`;
  if (nr) {
    const filled = clamp((state.renown - rank.at) / (nr.at - rank.at) * 100, 0, 100);
    const nextIdx = idx + 1;
    const unlockPatterns = Object.values(TABARD_PATTERNS).filter(p => p.minRank === nextIdx).length;
    const unlockColors = TABARD_COLOR_MIN_RANK.filter(m => m === nextIdx).length;
    const unlockEmblemIdx = TABARD_EMBLEM_MIN_RANK.map((m, i) => m === nextIdx ? i : -1).filter(i => i >= 0);
    const bits = [];
    if (unlockPatterns) bits.push(`${unlockPatterns} pattern${unlockPatterns > 1 ? 's' : ''}`);
    if (unlockColors) bits.push(`${unlockColors} color${unlockColors > 1 ? 's' : ''}`);
    if (unlockEmblemIdx.length) bits.push(`${unlockEmblemIdx.length} emblem${unlockEmblemIdx.length > 1 ? 's' : ''} (${unlockEmblemIdx.map(i => TABARD_EMBLEMS[i]).join(' ')})`);
    html += `<div class="bar"><div style="width:${filled}%"></div></div>
      <div class="sub">${esc(nr.name)} at ${nr.at} renown${bits.length ? ` — Unlocks: ${bits.join(', ')}` : ''}</div>`;
  } else {
    html += `<div class="sub">The realm knows no higher honor.</div>`;
  }
  html += '</div>';
  return html;
}

    <div class="spread" style="margin-bottom:8px">
      <div class="row">
        ${tabardSvg(state.tabard, 44)}

      <div class="row">
        <button class="ghost" onclick="A.openTabard()">🎨 ${state.tabard ? 'Edit' : 'Design'} tabard</button>

      </div>
    </div>
    <hr class="thin">
    <div class="spread">
      <div>

             <button class="act" ${state.gold < nextCost ? 'disabled' : ''} onclick="A.upgradeKeep()">Upgrade Keep — ${nextCost}g</button>`
          : '<div class="sub">The Keep stands at its full glory.</div>'}
      </div>
    </div>

  // passive income — the Keep's coffers fill over time; click to collect

  html += `<div class="card"><div class="spread">
    <div>🪙 Treasury — <b class="gold-t"><span data-income>${accrued}</span>g</b> waiting
      <span class="sub">(${incomeRate()}g/hour, holds up to ${CFG.KEEP_INCOME_CAP_H} hours)</span></div>
    <button class="act" ${accrued ? '' : 'disabled'} onclick="A.collectIncome()">Collect</button>

  // legacy / prestige
  html += legacyCardHtml();

  html += `<h3>🎓 Training Yard <span class="sub">(${Math.round(trainingRate())} XP/hour, sessions end after ${CFG.TRAINING_CAP_H}h — the safe, slow path)</span></h3>`;

  state.training.forEach(t => {

    html += `<div class="card"><div class="spread">
      <div><b>${esc(h.name)}</b> <span class="sub">Lv ${h.level} ${h.cls}</span> — earned <b class="blue">${trainingXpSoFar(t, now)} XP</b> so far</div>
      <div class="row"><span class="cd" data-cd="${t.end}"></span>
      <button class="ghost" onclick="A.recallTraining(${h.id})">Recall</button></div>
    </div></div>`;
  });

    html += `<div class="card"><div class="spread"><span class="empty">Empty training slot</span>
      <button class="act" ${idleHeroes().length ? '' : 'disabled'} onclick="A.openHeroPicker('train')">Assign hero</button></div></div>`;
  }

  // rest
  html += `<h3>🛌 Barracks <span class="sub">(${CFG.REST_DURATION_H}h of rest — removes one injury mark, earns nothing)</span></h3>`;
  if (state.rests.length === 0) html += '<div class="empty">No one is resting.</div>';
  state.rests.forEach(r => {
    const h = heroById(r.heroId);
    if (!h) return;
    html += `<div class="card"><div class="spread">
      <div><b>${esc(h.name)}</b> <span class="sub">Lv ${h.level} ${h.cls}</span> ${marksHtml(h)}</div>
      <div class="row"><span class="cd" data-cd="${r.end}"></span>

  const restable = idleHeroes().filter(h => h.marks > 0);

}

function renderTavern() {
  let html = `<h2>🍺 The Tavern</h2>

    const full = livingHeroes().length >= rosterCap();
    html += `<div class="card">
      <div class="spread"><b>${esc(r.name)}</b> <span class="tag ${c.role}">${ROLE_ICON[c.role]} ${r.cls}</span></div>
      <div class="sub">Level ${r.level} · Rating ${heroRating(r)} · Talent +${r.talent}</div>
      ${powerLineHtml(r)}
      <div class="row" style="margin-top:8px">

      </div>

function missionRow(def, story, statusHtml) {
  const size = def.size || 4;
  const sizeMult = 1 + Math.max(0, size - 4) * CFG.PARTY_SIZE_REWARD_BONUS;
  const baseGold = Math.round(def.cr * CFG.GOLD_PER_CR * (story ? CFG.STORY_GOLD_MULT : 1) * sizeMult);
  const baseXp = Math.round(def.cr * CFG.XP_PER_CR * (story ? CFG.STORY_XP_MULT : 1) * sizeMult);
  const idle = idleHeroes();
  const canStaff = idle.filter(h => CLASSES[h.cls].role === 'tank').length >= 1 &&
                   idle.filter(h => CLASSES[h.cls].role === 'healer').length >= 1 &&
                   idle.filter(h => CLASSES[h.cls].role === 'dps').length >= 2 &&
                   idle.length >= size;
  const sizeTxt = size > 4 ? `<b class="gold-t">${size} heroes</b>` : `${size} heroes`;
  return `<div class="card">
    <div class="spread">
      <div>
        <b>${esc(def.name)}</b>
        <span class="sub"> · CR ${def.cr} · ${fmtHours(def.hours)} · ${sizeTxt} · ~${baseGold}g, ~${baseXp} XP each</span>
        ${def.flavor ? `<div class="flavor">${esc(def.flavor)}</div>` : ''}
        ${def.expires ? `<div class="sub">Leaves the board in <span class="cd" data-cd="${def.expires}"></span></div>` : ''}
      </div>
      <div class="m-side" style="text-align:right; min-width:130px">
        ${statusHtml !== undefined ? statusHtml :
          `<button class="act" ${canStaff ? '' : 'disabled'} onclick='A.openPicker(${escAttr(JSON.stringify(JSON.stringify({ def: { name: def.name, cr: def.cr, hours: def.hours, size, flavor: def.flavor }, story })))})'>Send party</button>
           ${canStaff ? '' : `<div class="sub">Need ${size} ready (min 1 tank, 1 healer, 2 DPS)</div>`}`}
      </div>
    </div>
  </div>`;
}

/* ---------- Campaigns ---------- */
function renderCampaigns() {
  let html = '<h2>📖 Campaigns</h2>';
  CAMPAIGNS.forEach((camp, c) => {
    const unlocked = c === 0 || state.campaigns[c - 1] >= 5;
    const done = state.campaigns[c];
    html += `<div class="card" style="background:var(--panel2)">
      <div class="spread"><b style="color:var(--gold)">${unlocked ? '' : '🔒 '}${esc(camp.name)}</b>
      <span class="sub">${camp.levelHint} · ${done}/5 complete</span></div>
      <div class="flavor">${esc(camp.desc)}</div></div>`;
    if (!unlocked) {
      html += `<div class="empty" style="margin-bottom:14px">Complete “${esc(CAMPAIGNS[c - 1].name)}” to unlock.</div>`;
      return;
    }
    camp.missions.forEach((mdef, i) => {
      let statusHtml;
      const inProgress = state.activeMissions.some(m => m.story && m.story.c === c && m.story.i === i);
      if (i < done) statusHtml = '<span class="green">✓ Complete</span>';
      else if (inProgress) statusHtml = '<span class="blue">Party in the field…</span>';
      else if (i > done) statusHtml = '<span class="sub">🔒 Locked</span>';
      if (i === done && !inProgress) statusHtml = undefined; // renders Send party button
      // hide the name & flavor of not-yet-unlocked chapters — no spoilers, but keep the
      // planning stats (CR / duration / party size / reward estimates) visible
      const rowDef = i > done ? { ...mdef, name: `Chapter ${i + 1}: ???`, flavor: '' } : mdef;
      html += missionRow(rowDef, { c, i }, statusHtml);
    });
    html += '<div style="height:14px"></div>';
  });
  if (charterEligible()) {
    html += `<div class="card legendary-glow" style="background:var(--panel2)">
      <div class="spread"><b style="color:var(--gold)">⚜ Retire the Charter</b>
      <button class="act" onclick="A.askRetire()">🏆 Retire the Charter</button></div>
      <div class="flavor">The Worldworm is slain. Nothing remains but legend — and the next generation.</div></div>`;
  }
  return html;
}

/* ---------- Roster ---------- */
function renderRoster() {
  const living = livingHeroes();
  const dead = state.heroes.filter(h => h.status === 'dead');
  const roleCount = role => living.filter(h => CLASSES[h.cls].role === role).length;
  let html = `<h2>🗡 Roster <span class="sub">${living.length}/${rosterCap()} heroes</span></h2>`;
  const tabs = [['all', `All (${living.length})`], ['tank', `🛡 Tanks (${roleCount('tank')})`],
                ['healer', `✚ Healers (${roleCount('healer')})`], ['dps', `⚔ DPS (${roleCount('dps')})`]];
  html += `<div class="row" style="margin-bottom:10px">` + tabs.map(([k, label]) =>
    `<button class="subtab ${ui.rosterTab === k ? 'active' : ''}" onclick="A.setRosterTab('${k}')">${label}</button>`).join('') + `</div>`;
  const order = { idle: 0, injured: 1, mission: 2, training: 3, resting: 4 };
  const shown = living.filter(h => ui.rosterTab === 'all' || CLASSES[h.cls].role === ui.rosterTab);
  if (!shown.length) {
    html += '<div class="empty">No heroes of this role. Recruit some at the Tavern.</div>';
  } else {
    html += '<div class="grid">';
    shown.slice().sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9) || b.level - a.level)
      .forEach(h => { html += heroCard(h, heroActions(h)); });
    html += '</div>';
  }
  if (dead.length) {
    html += '<h3 class="red">☠ Hall of the Fallen</h3><div class="grid">';
    dead.forEach(h => {
      html += `<div class="card" style="opacity:.55"><div class="spread"><b>${esc(h.name)}</b>
        <span class="tag">${h.cls}</span></div>
        <div class="sub">Died at level ${h.level}. Remembered.</div></div>`;
    });
    html += '</div>';
  }
  return html;
}

/* ---------- Inventory (relic management) ---------- */
function renderInventory() {
  const relics = state.relics;
  const openCount = relics.filter(r => !r.equippedBy).length;
  const equippedCount = relics.filter(r => r.equippedBy).length;
  let html = `<h2>🎒 Inventory <span class="sub">${relics.length} relic${relics.length !== 1 ? 's' : ''}</span></h2>
    <div class="sub" style="margin-bottom:10px">Each hero equips one relic; its effect applies automatically on missions. Consumable relics break when their charges run out.</div>
