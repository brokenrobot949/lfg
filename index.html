      <button class="subtab ${ui.invTab === 'open' ? 'active' : ''}" onclick="A.setInvTab('open')">🟢 Available (${openCount})</button>
      <button class="subtab ${ui.invTab === 'equipped' ? 'active' : ''}" onclick="A.setInvTab('equipped')">🎽 Equipped (${equippedCount})</button>
    </div>`;
  const order = { legendary: 0, rare: 1, magic: 2, common: 3 };
  const filtered = relics.filter(r => ui.invTab === 'equipped' ? r.equippedBy : !r.equippedBy);
  const sorted = filtered.slice().sort((a, b) => order[a.tier] - order[b.tier]);
  if (!sorted.length) {
    html += ui.invTab === 'equipped'
      ? '<div class="empty">No relics equipped. Equip one from the Available tab.</div>'
      : '<div class="empty">No unequipped relics. Earn them on missions or buy them at the Reliquary.</div>';
    return html;
  }
  html += '<div class="grid">';
  sorted.forEach(r => {
    const acts = [];
    if (r.equippedBy) {
      const h = heroById(r.equippedBy);
      const locked = h && h.status === 'mission';
      acts.push(`<button class="ghost" ${locked ? 'disabled' : ''} onclick="A.unequipRelic(${r.id})">${locked ? 'On mission' : 'Unequip'}</button>`);
    } else {
      acts.push(`<button class="act" onclick="A.openEquip(${r.id})">Equip</button>`);
      acts.push(`<button class="ghost" onclick="A.sellRelic(${r.id})">Sell — ${relicSellValue(r)}g</button>`);
    }
    html += relicCard(r, acts.join(''));
  });
  html += '</div>';
  return html;
}

/* ---------- Modals ---------- */
function renderModal() {
  const root = $('modal-root');
  if (ui.naming) { root.innerHTML = guildModal(); focusGuildInput(); return; }
  if (ui.awayMsgs) { root.innerHTML = awayModal(); return; }
  if (state.briefings.length) { root.innerHTML = briefingModal(); return; }
  if (ui.dataModal) { root.innerHTML = dataModal(); return; }
  if (ui.tabardEditor) { root.innerHTML = tabardEditorModal(); return; }
  if (ui.legacyShop) { root.innerHTML = legacyShopModal(); return; }
  if (ui.confirmRetire) { root.innerHTML = retireModal(); return; }
  if (ui.confirmReset) { root.innerHTML = resetModal(); return; }
  if (ui.confirmDismiss != null) { root.innerHTML = dismissModal(); return; }
  if (ui.equipRelic != null) { root.innerHTML = equipRelicModal(); return; }
  if (ui.equipHero != null) { root.innerHTML = equipHeroModal(); return; }
  if (ui.picker) { root.innerHTML = pickerModal(); return; }
  if (ui.heroPicker) { root.innerHTML = heroPickerModal(); return; }
  root.innerHTML = '';
}

// keep focus in the guild-name field without wiping what the user has typed
function focusGuildInput() {
  const el = $('guildNameInput');
  if (el && document.activeElement !== el) { el.focus(); el.selectionStart = el.value.length; }
}

function guildModal() {

function briefingModal() {

function partyCompValid(picked, size) {
  const n = r => picked.filter(h => CLASSES[h.cls].role === r).length;
  return picked.length === size && n('tank') >= 1 && n('healer') >= 1 && n('dps') >= 2;
}

function pickerModal() {
  const { def, story } = ui.picker;
  const size = def.size || 4;
  const picked = ui.picked.map(heroById);
  const roles = { tank: [], healer: [], dps: [] };
  idleHeroes().forEach(h => roles[CLASSES[h.cls].role].push(h));
  Object.values(roles).forEach(a => a.sort((x, y) => heroRating(y) - heroRating(x)));

  const min = { tank: 1, healer: 1, dps: 2 };
  let rows = '';
  ['tank', 'healer', 'dps'].forEach(role => {
    const have = picked.filter(h => CLASSES[h.cls].role === role).length;
    const ok = have >= min[role];
    rows += `<h3>${ROLE_ICON[role]} ${ROLE_NAME[role]} <span class="sub ${ok ? 'green' : ''}">${have} picked (need ≥${min[role]})</span></h3>`;
    if (!roles[role].length) rows += '<div class="empty">No one available.</div>';
    roles[role].forEach(h => {
      const sel = ui.picked.includes(h.id);
      rows += `<div class="pick-row ${sel ? 'sel' : ''}" onclick="A.togglePick(${h.id})">
        <span class="nm"><b>${esc(h.name)}</b> <span class="sub">Lv ${h.level} ${h.cls} · Rating ${heroRating(h)}</span>
        ${powerLineHtml(h)}
        ${relicCompactHtml(h)}</span>
        ${h.marks === CFG.MAX_MARKS - 1 ? '<span class="red" title="One more injury kills this hero">⚠ 2 marks</span>' : marksHtml(h)}
      </div>`;
    });
  });

  let preview = '';
  if (picked.length) {
    const r = partyRating(picked);
    let inner = `<div class="row"><span>Party rating: <b class="gold-t">${r}</b> vs CR <b>${def.cr}</b> · ${picked.length}/${size} picked</span></div>`;
    if (partyCompValid(picked, size)) {
      const sc = successChance(picked, def.cr);
      const dur = missionDurationMs(def.hours, picked);
      const injS = picked.map(h => injuryChance(picked, h, def.cr, false));
      const injF = picked.map(h => injuryChance(picked, h, def.cr, true));
      const avg = a => a.reduce((x, y) => x + y, 0) / a.length;
      inner += `
        <div class="row"><span>Success chance: <b class="${chanceClass(sc)}">${pct(sc)}</b></span>
        <span>Duration: <b>${fmtDur(dur)}</b></span></div>
        <div class="row sub"><span>Injury risk per hero: ~${pct(avg(injS))} on success, ~${pct(avg(injF))} on failure</span></div>
        <div class="row sub"><span>Reward: ~${missionGoldReward(def.cr, !!story, picked, true)}g · ~${missionXpReward(def.cr, !!story, picked, representativeHero(picked), true)} XP each (partial on failure)</span></div>
        ${(() => { const rl = picked.map(heroRelic).filter(Boolean); return rl.length ? `<div class="row sub"><span>Relics in play: ${rl.map(r => `<span class="q-${r.tier}">${RELICS[r.key].icon} ${esc(RELICS[r.key].name)}</span>`).join(', ')}</span></div>` : ''; })()}`;
    } else if (picked.length < size) {
      inner += `<div class="sub">Pick ${size - picked.length} more…</div>`;
    } else {
      inner += `<div class="sub red">Party needs at least 1 tank, 1 healer, and 2 DPS.</div>`;
    }
    preview = `<div class="preview">${inner}</div>`;
  }

  const ready = partyCompValid(picked, size);
  return `<div id="modal-wrap" onclick="if(event.target.id==='modal-wrap')A.closePicker()"><div class="modal">
    <h2>Assemble party — ${esc(def.name)}</h2>
    <div class="sub">CR ${def.cr} · base ${fmtHours(def.hours)} · party of ${size}${size > 4 ? ` (+${Math.round((size - 4) * CFG.PARTY_SIZE_REWARD_BONUS * 100)}% rewards)` : ''}${story ? ' · story mission' : ' · repeatable'}</div>
    <div class="flavor">${esc(def.flavor)}</div>
    ${rows}
    ${preview}
    <div class="spread" style="margin-top:12px">
      <button class="ghost" onclick="A.closePicker()">Cancel</button>
      <button class="act" ${ready ? '' : 'disabled'} onclick="A.confirmParty()">⚔ Venture forth!</button>
    </div>
  </div></div>`;
}

function heroPickerModal() {
  const purpose = ui.heroPicker;
  const pool = purpose === 'train' ? idleHeroes() : idleHeroes().filter(h => h.marks > 0);
  const title = purpose === 'train' ? '🎓 Assign to training' : '🛌 Send to rest';
  const note = purpose === 'train'
    ? `${Math.round(trainingRate())} XP/hour for up to ${CFG.TRAINING_CAP_H} hours.`
    : `${CFG.REST_DURATION_H} hours; removes one injury mark.`;
  return `<div id="modal-wrap" onclick="if(event.target.id==='modal-wrap')A.closeHeroPicker()"><div class="modal">
    <h2>${title}</h2><div class="sub" style="margin-bottom:10px">${note}</div>
    ${pool.map(h => `<div class="pick-row" onclick="A.pickHeroFor(${h.id})">
      <span class="nm"><b>${esc(h.name)}</b> <span class="sub">Lv ${h.level} ${h.cls}</span></span>
      ${marksHtml(h)}
    </div>`).join('') || '<div class="empty">No eligible heroes.</div>'}
    <div style="text-align:right; margin-top:10px"><button class="ghost" onclick="A.closeHeroPicker()">Cancel</button></div>
  </div></div>`;
}

function renderDrawer() {
  const root = $('drawer-root');
  if (!ui.drawer) { root.innerHTML = ''; return; }
  root.innerHTML = `<div id="drawer">
    <div class="spread"><h2 style="margin:0">📜 Chronicle</h2>
    <button class="ghost" onclick="A.toggleDrawer()">Close</button></div>
    <div style="margin-top:10px">
    ${state.log.slice().reverse().map(l => `<div class="logline"><span class="lt">${fmtWhen(l.t)}</span>${esc(l.msg)}</div>`).join('') || '<div class="empty">Nothing yet.</div>'}
    </div></div>`;
}

/* =====================================================================
 *  ACTION DISPATCH (called from inline handlers)
 * ===================================================================== */
const A = {
  setView,
  toggleDrawer() { ui.drawer = !ui.drawer; renderDrawer(); },
  closeAway() { ui.awayMsgs = null; renderModal(); },

  // --- guild naming ---
  openRename() { ui.naming = 'rename'; ui._guildSuggestion = state.guildName; renderModal(); },
  closeNaming() { ui.naming = null; delete ui._guildSuggestion; renderModal(); },
  rollGuildName() {
    const name = genGuildName();
    ui._guildSuggestion = name;
    const el = $('guildNameInput');
    if (el) { el.value = name; el.focus(); }
  },
  confirmGuildName() {
    const el = $('guildNameInput');
    const val = el ? el.value : (ui._guildSuggestion || '');
    if (ui.naming === 'rename') { if (!renameGuild(val)) return; }
    else foundGuild(val);
    ui.naming = null; delete ui._guildSuggestion;
    render();
  },

  // --- mission briefings ---
  nextBriefing() { state.briefings.shift(); save(); render(); },

  // --- dismiss a hero ---
  askDismiss(id) { ui.confirmDismiss = id; renderModal(); },
  cancelDismiss() { ui.confirmDismiss = null; renderModal(); },
  confirmDismissHero() { const id = ui.confirmDismiss; ui.confirmDismiss = null; dismissHero(id); render(); },

  // --- reset all data ---
  askReset() { ui.confirmReset = true; renderModal(); },
  cancelReset() { ui.confirmReset = false; renderModal(); },
  doReset() {
    ui.confirmReset = false;
    try { window.removeEventListener('beforeunload', save); } catch (e) { /* ignore */ }
    try { localStorage.removeItem(CFG.SAVE_KEY); } catch (e) { /* ignore */ }
    location.reload(); // boot() starts a fresh game and prompts for a new guild name
  },

  // --- backup & restore ---
  openData() { ui.dataModal = true; renderModal(); },
  closeData() { ui.dataModal = false; renderModal(); },
  exportDownload() {
    const data = exportSaveText();
    try {
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `lfg-save-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setStatus('exportStatus', 'Saved to your downloads.');
    } catch (e) { setStatus('exportStatus', 'Download blocked — copy the text instead.', true); }
  },
  async exportCopy() {
    const data = exportSaveText();
    try {
      await navigator.clipboard.writeText(data);
      setStatus('exportStatus', 'Copied to clipboard.');
    } catch (e) {
      const el = $('exportText'); if (el) { el.focus(); el.select(); }
      setStatus('exportStatus', 'Press Ctrl/Cmd+C to copy the selected text.', true);
    }
  },
  importFile(ev) {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { const el = $('importText'); if (el) el.value = reader.result; setStatus('importStatus', 'File loaded — press “Load this save”.'); };
    reader.onerror = () => setStatus('importStatus', 'Could not read that file.', true);
    reader.readAsText(file);
  },
  importFromText() {
    const el = $('importText');
    const text = el ? el.value.trim() : '';
    if (!text) { setStatus('importStatus', 'Paste your save text or choose a file first.', true); return; }
    const res = applyImport(text);
    if (res.ok) { ui.dataModal = false; render(); }
    else setStatus('importStatus', res.msg, true);
  },

  // --- relics: shop, equip, inventory ---
  buyRelic(i) {
    const entry = state.shop.relics[i];
    if (!entry || state.gold < entry.price) return;
    state.gold -= entry.price;
    state.relics.push(makeRelic(entry.key));
    state.shop.relics.splice(i, 1);
    log(`⚱ Bought ${RELICS[entry.key].icon} ${RELICS[entry.key].name} for ${entry.price} gold.`);
    save(); render();
  },
  refreshShopPaid() {
    if (state.gold < CFG.SHOP_REFRESH_COST) return;
    state.gold -= CFG.SHOP_REFRESH_COST;
    refreshShop(Date.now());
    log('⚱ You pay the keeper to haul out new stock.');
    save(); render();
  },
  unequipRelic, sellRelic,
  setInvTab(t) { ui.invTab = t; render(); },
  openEquip(id) { ui.equipRelic = id; renderModal(); },
  closeEquip() { ui.equipRelic = null; renderModal(); },
  doEquipToHero(heroId) { equipRelic(ui.equipRelic, heroId); ui.equipRelic = null; render(); },
  openEquipHero(id) { ui.equipHero = id; renderModal(); },
  closeEquipHero() { ui.equipHero = null; renderModal(); },
  doEquipRelic(relicId) { equipRelic(relicId, ui.equipHero); render(); }, // keep modal open to show the swap

  openPicker(json) {
    ui.picker = JSON.parse(json);
    ui.picked = [];
    renderModal();
  },
  closePicker() { ui.picker = null; ui.picked = []; renderModal(); },
  togglePick(id) {
    const h = heroById(id);
    if (!h || !ui.picker) return;
    const size = ui.picker.def.size || 4;
    if (ui.picked.includes(id)) {
      ui.picked = ui.picked.filter(x => x !== id);
    } else if (ui.picked.length < size) {
      ui.picked.push(id);
    }
    renderModal();
  },
  confirmParty() {
    if (!ui.picker) return;
    const size = ui.picker.def.size || 4;
    if (!partyCompValid(ui.picked.map(heroById), size)) return;
    startMission(ui.picker.def, ui.picked, ui.picker.story);
    ui.picker = null; ui.picked = [];
    render();
  },

  openHeroPicker(purpose) { ui.heroPicker = purpose; renderModal(); },
  closeHeroPicker() { ui.heroPicker = null; renderModal(); },
  pickHeroFor(id) {
    const purpose = ui.heroPicker;
    ui.heroPicker = null;
    if (purpose === 'train') assignTraining(id);
    else assignRest(id);
    render();
  },

  assignTraining(id) { assignTraining(id); render(); },
  assignRest(id) { assignRest(id); render(); },
  recallTraining, cancelRest, healMark, recruitHero, payRefreshRecruits, upgradeKeep,
  setRosterTab(t) { ui.rosterTab = t; render(); },
  collectIncome() {
    const amt = accruedIncome(Date.now());
    if (!amt) return;
    state.gold += amt;
    state.lastCollect = Date.now();
    log(`🪙 Collected ${amt} gold from the Keep's coffers.`);
    save(); render();
  },

  // --- guild tabard ---
  openTabard() {
    ui.tabardEditor = state.tabard
      ? Object.assign({}, state.tabard)
      : { pattern: 'pale', c1: TABARD_COLORS[0], c2: TABARD_COLORS[3], emblem: '🦁' }; // c2 defaults to gold (#d4a72c)
    renderModal();
  },
  closeTabard() { ui.tabardEditor = null; renderModal(); },
  setTabardPattern(p) { if (ui.tabardEditor && patternUnlocked(p)) { ui.tabardEditor.pattern = p; renderModal(); } },
  setTabardColor(field, idx) { if (ui.tabardEditor && colorUnlocked(idx)) { ui.tabardEditor[field] = TABARD_COLORS[idx]; renderModal(); } },
  setTabardEmblem(idx) { if (ui.tabardEditor && emblemUnlocked(idx)) { ui.tabardEditor.emblem = TABARD_EMBLEMS[idx]; renderModal(); } },
  saveTabard() {
    if (!ui.tabardEditor) return;
    const firstTime = !state.tabard;
    state.tabard = Object.assign({}, ui.tabardEditor);
    ui.tabardEditor = null;
    log(`🎨 The guild's tabard is ${firstTime ? 'raised' : 'redesigned'} above the Keep.`);
    save();
    render();
  },

  // --- legacy / prestige ---
  openLegacy() { ui.legacyShop = true; renderModal(); },
  closeLegacy() { ui.legacyShop = false; renderModal(); },
  buyPerk(key) {
    const p = LEGACY_PERKS[key];
    if (!p) return;
    const owned = legacyTier(key);
    if (owned >= p.tiers.length) return;           // already maxed
    const cost = p.tiers[owned].cost;
    if (state.legacy.points < cost) return;        // can't afford
    state.legacy.points -= cost;
    state.legacy.perks[key] = owned + 1;
    log(`⚜ Legacy perk acquired: ${p.icon} ${p.name} (tier ${owned + 1}).`);
    save();
    renderModal();
  },
  askRetire() { ui.confirmRetire = true; renderModal(); },
  cancelRetire() { ui.confirmRetire = false; renderModal(); },
  confirmRetire() { retireCharter(); render(); },
};
window.A = A;

/* =====================================================================
 *  TICK LOOP
 * ===================================================================== */
let tickCount = 0;
function tick() {
  const now = Date.now();
  // fast countdown updates without a full re-render
  document.querySelectorAll('[data-cd]').forEach(el => {
    el.textContent = fmtDur(Number(el.dataset.cd) - now);
  });
  document.querySelectorAll('[data-income]').forEach(el => { el.textContent = accruedIncome(now); });
  // don't re-render (and wipe an open text field) while a modal with inputs is up
  const blockRender = !!ui.naming || ui.dataModal;
  let dirty = false;
  if (pendingEvents(now).length) { processEvents(now); dirty = true; }   // resolve missions/training/rest; queues briefings
  if (autoRefreshRecruits(now)) { save(); dirty = true; }                 // 12–18h hire board reshuffle
  if (autoRefreshShop(now)) { save(); dirty = true; }                     // 12–24h Reliquary restock
  if (state.jobBoard.some(j => j.expires <= now)) { refreshJobBoard(now); save(); dirty = true; }
  if (dirty && !blockRender) render();
  if (++tickCount % 20 === 0) save();
}

/* =====================================================================
 *  BOOT
 * ===================================================================== */
(function boot() {
  const now = Date.now();
  if (load()) {
    // migrate saves from before these features existed
    if (!Array.isArray(state.jobBoard)) state.jobBoard = [];
    if (typeof state.guildName !== 'string') state.guildName = '';
    if (!Array.isArray(state.relics)) state.relics = [];
    if (!state.shop || !Array.isArray(state.shop.relics)) state.shop = { relics: [], expires: 0 };
    if (state.tabard === undefined) state.tabard = null;
    if (typeof state.renown !== 'number') state.renown = retroactiveRenown();
    if (!state.legacy || typeof state.legacy !== 'object' || !state.legacy.perks) state.legacy = { points: 0, ascensions: 0, perks: {} };
    if (typeof state.lastCollect !== 'number') state.lastCollect = Date.now();
    if (!Array.isArray(state.briefings)) state.briefings = [];
    state.heroes.forEach(ensureHeroPower);           // heroes from before powers existed
    (state.recruits || []).forEach(ensureHeroPower);
    const away = now - (state.lastSeen || now);
    const logBefore = state.log.length;
    const processed = processEvents(now);
    if (processed > 0 && away > CFG.AWAY_MODAL_MIN_S * 1000) {
      ui.awayMsgs = state.log.slice(logBefore).map(l => l.msg);
    }
    // offline-resolved briefings persist in state.briefings and show after the away modal
    if (!state.recruits.length) refreshRecruitPool();
    autoRefreshRecruits(now);   // reshuffle the hire board if its timer lapsed while away
    autoRefreshShop(now);       // restock the Reliquary if its timer lapsed while away
    if (!state.shop.relics.length) refreshShop(now);
    refreshJobBoard(now);
    if (!state.guildName) ui.naming = 'found'; // migrated player still needs to name the guild
    save();
  } else {
    initNewGame(now);
    ui.naming = 'found';        // brand-new guild: prompt for a name first
  }
  render();
  setInterval(tick, 1000);
  window.addEventListener('beforeunload', save);
  // debug handle (harmless in normal play)
  window.LFG = { get state() { return state; }, get ui() { return ui; }, save, processEvents, render, refreshJobBoard, autoRefreshRecruits, refreshShop, makeRelic, startMission, RELICS, CFG, rankIdx, guildRank, retireCharter, legacyTier, legacyValue, charterEligible };
})();
</script>
